# Horizontal scaling overrides — use with prod-scale stack preset.
# Usage:
#   pnpm platform:up -- --stack=prod-scale --scale-worker=3
#   pnpm platform:scale -- --stack=prod-scale --worker=3 --worker-fast=2

services:
  api:
    environment:
      AUDIT_DB_POOL_SIZE: "10"
      AUDIT_DB_MAX_OVERFLOW: "20"
      AUDIT_REDIS_MAX_CONNECTIONS: "32"
      AUDIT_DIRECT_UPLOAD_ENABLED: "true"

  worker:
    environment:
      AUDIT_WORKER_OCR_MAX_JOBS: "1"
    deploy:
      replicas: 1

  worker-fast:
    environment:
      AUDIT_WORKER_FAST_MAX_JOBS: "8"
