server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels:
          - __meta_docker_container_label_com_docker_compose_project
        regex: repody
        action: keep
      - source_labels:
          - __meta_docker_container_label_com_docker_compose_service
        target_label: service
      - source_labels:
          - __meta_docker_container_name
        regex: /(.*)
        target_label: container
      - source_labels:
          - __meta_docker_container_log_stream
        target_label: stream
    pipeline_stages:
      - docker: {}
      - match:
          selector: '{service=~"api|worker|worker-fast|web"}'
          stages:
            - json:
                expressions:
                  content: log
            - json:
                expressions:
                  level: level
                  event: event
                  body: body
                  run_id: run_id
                  request_id: request_id
                  workflow_id: workflow_id
                  trace_id: trace_id
                  event_domain: event_domain
                source: content
            - structured_metadata:
                level:
                event:
                run_id:
                request_id:
                workflow_id:
                trace_id:
                event_domain:
