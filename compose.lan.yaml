# LAN sharing — let other devices on your network use Repody via your machine's IP.
# 1. Set PUBLIC_HOST in .env (or run: pnpm docker:configure:lan)
# 2. pnpm docker:deploy:lan
#
# Users open: http://<PUBLIC_HOST>:3000
# Ensure Windows Firewall allows inbound TCP 3000 and 9000.

services:
  minio:
    environment:
      MINIO_API_CORS_ALLOW_ORIGIN: "http://${PUBLIC_HOST:?Set PUBLIC_HOST}:3000"

  api:
    environment:
      AUDIT_CORS_ORIGINS: '["http://${PUBLIC_HOST}:3000"]'
      AUDIT_MINIO_PUBLIC_ENDPOINT: ${PUBLIC_HOST}:9000
