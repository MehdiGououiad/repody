# Repody VLM CPU stack. Inference is served by Docker Model Runner.

x-repody-vlm-environment: &repody-vlm-environment
  AUDIT_EXTRACTOR: pipeline
  AUDIT_INFERENCE_MODE: ${AUDIT_INFERENCE_MODE:-docker_model_runner}
  AUDIT_VLLM_BASE_URL: ${AUDIT_VLLM_BASE_URL:-http://vllm:8000/v1}
  AUDIT_DOCKER_MODEL_RUNNER_BASE_URL: ${AUDIT_DOCKER_MODEL_RUNNER_BASE_URL:-http://model-runner.docker.internal/engines/llama.cpp/v1}
  AUDIT_DEFAULT_OCR_MODEL: repody:vlm
  AUDIT_REPODY_VLM_MODEL: ${AUDIT_REPODY_VLM_MODEL:-agentcontrol/repody-vlm:q4_k_m-16k}
  AUDIT_REPODY_VLM_ENABLED: "true"
  AUDIT_REPODY_VLM_MAX_TOKENS: "512"
  AUDIT_REPODY_VLM_MAX_EDGE_PX: "1024"
  AUDIT_REPODY_VLM_PDF_DPI: "120"
  AUDIT_REPODY_VLM_TIMEOUT_SECONDS: "600"
  AUDIT_OCR_MAX_PAGES: "4"
  AUDIT_OCR_MAX_EDGE_PX: "1024"
  AUDIT_REPODY_VLM_MAX_PAGES_PER_REQUEST: "4"
  AUDIT_REPODY_VLM_WARMUP_ON_START: ${AUDIT_REPODY_VLM_WARMUP_ON_START:-true}
  AUDIT_HEALTHZ_PROBE_INFERENCE: ${AUDIT_HEALTHZ_PROBE_INFERENCE:-false}
  AUDIT_GPU_LIVE_PROBE: ${AUDIT_GPU_LIVE_PROBE:-false}
  AUDIT_MINIO_PUBLIC_ENDPOINT: localhost:9000
  AUDIT_DIRECT_UPLOAD_ENABLED: "true"
  AUDIT_LOG_JSON: "true"
  HATCHET_CLIENT_HOST_PORT: hatchet-lite:7077

services:
  api:
    environment:
      <<: *repody-vlm-environment
      AUDIT_OTEL_SERVICE_NAME: audit-workbench-api

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    command: python -m audit_workbench.hatchet.worker
    environment:
      <<: *repody-vlm-environment
      AUDIT_WORKER_POOL: ocr
      AUDIT_WORKER_OCR_MAX_JOBS: "1"
      AUDIT_OTEL_SERVICE_NAME: audit-workbench-worker-ocr

  worker-fast:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    command: python -m audit_workbench.hatchet.worker
    environment:
      <<: *repody-vlm-environment
      AUDIT_WORKER_POOL: fast
      AUDIT_WORKER_FAST_MAX_JOBS: "2"
      AUDIT_REPODY_VLM_WARMUP_ON_START: "false"
      AUDIT_OTEL_SERVICE_NAME: audit-workbench-worker-fast
      AUDIT_DATABASE_URL: postgresql+asyncpg://audit:audit@postgres:5432/audit_workbench
      AUDIT_REDIS_URL: redis://redis:6379/0
      AUDIT_STORAGE_BACKEND: s3
      AUDIT_MINIO_ENDPOINT: minio:9000
      AUDIT_MINIO_ACCESS_KEY: minioadmin
      AUDIT_MINIO_SECRET_KEY: minioadmin
      AUDIT_MINIO_BUCKET: audit-documents
      HATCHET_CLIENT_TLS_STRATEGY: none
      HATCHET_CLIENT_SERVER_URL: http://hatchet-lite:8888
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      hatchet-init:
        condition: service_completed_successfully
      minio:
        condition: service_started
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/scripts:/app/scripts
      - hatchet_shared:/shared
