# Fast local development overrides.
# Usage: pnpm docker:infra && pnpm docker:services && pnpm dev
# Or all-in-Docker web: pnpm docker:up:web-docker

services:
  api:
    command: uvicorn audit_workbench.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src --log-level debug
    environment:
      AUDIT_DEBUG: "true"
      AUDIT_DEPLOYMENT_ENVIRONMENT: development
      AUDIT_REPODY_VLM_WARMUP_ON_START: "false"
      AUDIT_OPERATOR_ACTIONS_ENABLED: "true"
    healthcheck:
      start_period: 120s
    volumes:
      - ./e2e:/app/e2e:ro
      - ./benchmark-reports:/app/benchmark-reports
    develop:
      watch:
        - path: ./backend/src
          action: sync
          target: /app/src
          ignore:
            - "**/__pycache__/**"
            - "**/*.pyc"

  worker:
    environment:
      AUDIT_DEBUG: "true"
      AUDIT_DEPLOYMENT_ENVIRONMENT: development
      AUDIT_REPODY_VLM_WARMUP_ON_START: "false"
    develop:
      watch:
        - path: ./backend/src
          action: sync+restart
          target: /app/src
          ignore:
            - "**/__pycache__/**"
            - "**/*.pyc"

  worker-fast:
    environment:
      AUDIT_DEBUG: "true"
      AUDIT_DEPLOYMENT_ENVIRONMENT: development
      AUDIT_REPODY_VLM_WARMUP_ON_START: "false"
    develop:
      watch:
        - path: ./backend/src
          action: sync+restart
          target: /app/src
          ignore:
            - "**/__pycache__/**"
            - "**/*.pyc"

  web:
    profiles: !reset
      - web-docker
    build:
      context: .
      dockerfile: Dockerfile.web.dev
    command: ["pnpm", "dev", "--turbo", "-H", "0.0.0.0", "-p", "3000"]
    environment:
      BACKEND_URL: http://api:8000
      INTERNAL_API_URL: http://api:8000
      NEXT_ALLOWED_DEV_ORIGINS: host.docker.internal
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  web_node_modules:
