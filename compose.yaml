# Local/dev data plane (see deploy/pinned-images.env)
# MinIO: pgsty community fork — upstream minio/minio no longer publishes images.
# Redis/Postgres: official Docker Library pins.
# Docs: docs/deploy/LOCAL.md
#
#   docker compose up -d
#   pnpm db:migrate
#   copy deploy\env\compose.env.example backend\.env
#   copy deploy\env.auth.example .env.local
#   pnpm dev:setup        # once — env files + migrate
#   pnpm dev:all          # daily — stack + API + UI (one terminal)
#   pnpm dev              # background only (Compose + workers + NuExtract)
#   pnpm dev:app          # foreground API + UI
#   pnpm dev:stop         # stop everything

name: repody

services:
  postgres:
    image: postgres:17.10-alpine
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit-local-dev
      POSTGRES_DB: audit_workbench
    ports:
      - "5432:5432"
    volumes:
      - repody-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit_workbench"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.8.0-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: pgsty/minio:RELEASE.2026-06-18T00-00-00Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio-local-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - repody-minio:/data

  minio-init:
    image: pgsty/mc:RELEASE.2026-04-17T00-00-00Z
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 minioadmin minio-local-dev &&
      mc mb --ignore-existing local/audit-documents
      "

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/helm/repody-auth/files/realm-repody.json:/opt/keycloak/data/import/realm-repody.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Taskiq workers — Linux containers (same image as API).
  worker-extract:
    profiles: [workers]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - path: deploy/env/observability.enabled.env
        required: false
    environment:
      AUDIT_DATABASE_URL: postgresql+asyncpg://audit:audit-local-dev@postgres:5432/audit_workbench
      AUDIT_REDIS_URL: redis://redis:6379/0
      AUDIT_STORAGE_BACKEND: s3
      AUDIT_MINIO_ENDPOINT: minio:9000
      AUDIT_MINIO_BUCKET: audit-documents
      AUDIT_MINIO_ACCESS_KEY: minioadmin
      AUDIT_MINIO_SECRET_KEY: minio-local-dev
      AUDIT_MINIO_SECURE: "false"
      AUDIT_OIDC_ENABLED: "false"
      AUDIT_LOG_JSON: "true"
      AUDIT_DEPLOYMENT_ENVIRONMENT: development
      AUDIT_OTEL_EXPORTER_ENDPOINT: http://otel-collector:4318/v1/traces
      AUDIT_OTEL_SERVICE_NAME: repody-worker-extract
      BUGSINK_DSN: ${BUGSINK_DSN:-}
      AUDIT_VLLM_BASE_URL: http://host.docker.internal:8081/v1
      AUDIT_VLLM_SERVED_MODEL: nuextract3-q4_k_m
      AUDIT_INFERENCE_MODE: vllm
      AUDIT_EXTRACTION_CACHE_ENABLED: "true"
      AUDIT_REPODY_VLM_WARMUP_ON_START: "true"
      AUDIT_REPODY_VLM_PDF_DPI: "170"
      AUDIT_REPODY_VLM_ENABLE_THINKING: "false"
      AUDIT_REPODY_VLM_MAX_TOKENS: "224"
      AUDIT_LLM_VALIDATION_ENABLED: "false"
      AUDIT_REPODY_VLM_TIMEOUT_SECONDS: "180"
      AUDIT_WORKER_TASK_TIMEOUT_MINUTES: "3"
      AUDIT_STALE_RUN_TIMEOUT_MINUTES: "5"
      AUDIT_QUEUED_STALE_TIMEOUT_MINUTES: "60"
      AUDIT_ADMISSION_MAX_EXTRACT_INFLIGHT: "2"
      AUDIT_WORKER_POOL: extract
      AUDIT_WORKER_EXTRACT_MAX_JOBS: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  worker-fast:
    profiles: [workers]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: deploy/env/observability.enabled.env
        required: false
    environment:
      AUDIT_DATABASE_URL: postgresql+asyncpg://audit:audit-local-dev@postgres:5432/audit_workbench
      AUDIT_REDIS_URL: redis://redis:6379/0
      AUDIT_STORAGE_BACKEND: s3
      AUDIT_MINIO_ENDPOINT: minio:9000
      AUDIT_MINIO_BUCKET: audit-documents
      AUDIT_MINIO_ACCESS_KEY: minioadmin
      AUDIT_MINIO_SECRET_KEY: minio-local-dev
      AUDIT_MINIO_SECURE: "false"
      AUDIT_OIDC_ENABLED: "false"
      AUDIT_LOG_JSON: "true"
      AUDIT_DEPLOYMENT_ENVIRONMENT: development
      AUDIT_OTEL_EXPORTER_ENDPOINT: http://otel-collector:4318/v1/traces
      AUDIT_OTEL_SERVICE_NAME: repody-worker-fast
      BUGSINK_DSN: ${BUGSINK_DSN:-}
      AUDIT_ADMISSION_MAX_INFLIGHT: "32"
      AUDIT_WORKER_POOL: fast
    restart: unless-stopped

  # ── Observability (optional: docker compose --profile observability up -d) ──
  # Grafana :3030 · Loki :3100 · Bugsink :8090 · OTLP :4318 · pnpm dev:observability
  bugsink-db:
    profiles: [observability]
    image: postgres:17.10-alpine
    environment:
      POSTGRES_USER: bugsink
      POSTGRES_PASSWORD: bugsink-local-dev
      POSTGRES_DB: bugsink
    volumes:
      - repody-bugsink-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bugsink -d bugsink"]
      interval: 5s
      timeout: 5s
      retries: 10

  bugsink:
    profiles: [observability]
    image: bugsink/bugsink:2
    depends_on:
      bugsink-db:
        condition: service_healthy
    ports:
      - "8090:8000"
    environment:
      SECRET_KEY: local-dev-bugsink-secret-key-at-least-fifty-characters-long
      CREATE_SUPERUSER: admin@repody.local:repody-dev
      PORT: 8000
      DATABASE_URL: postgresql://bugsink:bugsink-local-dev@bugsink-db:5432/bugsink
      BEHIND_HTTPS_PROXY: "false"
      BASE_URL: http://localhost:8090

  loki:
    profiles: [observability]
    image: grafana/loki:3.6.11
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/observability/loki-config.yaml:/etc/loki/config.yaml:ro
      - repody-loki:/loki

  tempo:
    profiles: [observability]
    image: grafana/tempo:2.9.2
    command: ["-config.file=/etc/tempo/config.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./deploy/observability/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - repody-tempo:/var/tempo

  otel-collector:
    profiles: [observability]
    image: otel/opentelemetry-collector-contrib:0.146.0
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4318:4318"
      - "4317:4317"
    volumes:
      - ./deploy/observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    depends_on:
      tempo:
        condition: service_started

  promtail:
    profiles: [observability]
    image: grafana/promtail:3.6.11
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./deploy/observability/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./.logs:/var/log/repody:ro
    depends_on:
      loki:
        condition: service_started

  grafana:
    profiles: [observability]
    image: grafana/grafana:12.4.1
    ports:
      - "3030:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - repody-grafana:/var/lib/grafana
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started

volumes:
  repody-postgres:
  repody-minio:
  repody-bugsink-db:
  repody-loki:
  repody-tempo:
  repody-grafana:
