# Microservice image split — separate tags per role (cloud / K8s / independent deploy).
# Chain after prod stack: ... -f compose.microservices.yaml
#
# Build & tag:
#   REGISTRY=ghcr.io/yourorg TAG=1.0.0 pnpm platform:images:build
# Push:
#   pnpm platform:images:push

x-image-api: &image-api
  ${AUDIT_IMAGE_REGISTRY:-}audit-api:${AUDIT_IMAGE_TAG:-latest}
x-image-worker: &image-worker
  ${AUDIT_IMAGE_REGISTRY:-}audit-worker:${AUDIT_IMAGE_TAG:-latest}
x-image-web: &image-web
  ${AUDIT_IMAGE_REGISTRY:-}audit-web:${AUDIT_IMAGE_TAG:-latest}

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    image: *image-api

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    image: *image-worker

  worker-fast:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    image: *image-worker

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: *image-web
