# OpenTelemetry traces (Tempo) — merge with compose.observability.yaml
# Usage: ... -f compose.observability-traces.yaml --profile obs-traces up -d
# Only merge this file when traces are desired (sets AUDIT_OTEL_ENABLED on api/workers).

x-otel-environment: &otel-environment
  AUDIT_OTEL_ENABLED: "true"
  AUDIT_OTEL_EXPORTER_ENDPOINT: http://tempo:4318/v1/traces

services:
  tempo:
    profiles:
      - obs-traces
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "4318:4318"
    volumes:
      - ./observability/tempo-config.yaml:/etc/tempo.yaml:ro
      - tempodata:/var/tempo
    restart: unless-stopped

  grafana:
    depends_on:
      - tempo

  api:
    environment:
      <<: *otel-environment
      AUDIT_OTEL_SERVICE_NAME: audit-workbench-api

  worker:
    environment:
      <<: *otel-environment
      AUDIT_OTEL_SERVICE_NAME: audit-workbench-worker-ocr

  worker-fast:
    environment:
      <<: *otel-environment
      AUDIT_OTEL_SERVICE_NAME: audit-workbench-worker-fast

volumes:
  tempodata:
