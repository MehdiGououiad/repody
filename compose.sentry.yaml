# Optional Sentry / GlitchTip env passthrough (merge with any stack)
# Set SENTRY_DSN in .env after creating a GlitchTip project.

x-sentry-environment: &sentry-environment
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
  SENTRY_RELEASE: ${SENTRY_RELEASE:-}
  SENTRY_LOG_LEVEL: ${SENTRY_LOG_LEVEL:-WARNING}

services:
  api:
    environment:
      <<: *sentry-environment
      SENTRY_ENABLE_LOGS: ${SENTRY_ENABLE_LOGS:-true}

  worker:
    environment:
      <<: *sentry-environment
      SENTRY_ENABLE_LOGS: "false"

  worker-fast:
    environment:
      <<: *sentry-environment
      SENTRY_ENABLE_LOGS: "false"

  web:
    environment:
      <<: *sentry-environment
      SENTRY_ENABLE_LOGS: "false"
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-${SENTRY_DSN:-}}
      SENTRY_DSN: ${SENTRY_DSN:-}
