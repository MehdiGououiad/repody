apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-repody
spec:
  # Scope which namespaces may reference this store (ESO security best practice).
  conditions:
    - namespaces:
        - repody
        # - repody-data   # if using a separate data namespace
  provider:
    vault:
      server: https://vault.yourdomain.com
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: repody
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
