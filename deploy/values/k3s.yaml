# Generic Kubernetes / k3s client profile — standard Ingress (Traefik on k3s).
global:
  deploymentEnvironment: production
  openshift:
    enabled: false
    routes:
      enabled: false

gatewayApi:
  enabled: false

ingress:
  enabled: true
  className: traefik
  annotations: {}

networkPolicy:
  dnsNamespaces:
    - kube-system

observability:
  otelEnabled: true
  otelEndpoint: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
