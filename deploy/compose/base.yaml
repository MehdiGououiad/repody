name: repody

# Image pins: deploy/pinned-images.env + docs/VERSIONS.md

services:
  postgres:
    image: ${REPODY_POSTGRES_IMAGE:-postgres:17.10-alpine}
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit_workbench
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit_workbench"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: ${REPODY_REDIS_IMAGE:-redis:8.8.0-alpine}
    ports:
      - "6379:6379"

  hatchet-postgres:
    image: ${REPODY_POSTGRES_IMAGE:-postgres:17.10-alpine}
    command: postgres -c max_connections=200
    environment:
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
      POSTGRES_DB: hatchet
    volumes:
      - hatchet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatchet -d hatchet"]
      interval: 5s
      timeout: 5s
      retries: 10

  hatchet-lite:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    ports:
      - "8888:8888"
      - "7077:7077"
    environment:
      DATABASE_URL: postgresql://hatchet:hatchet@hatchet-postgres:5432/hatchet?sslmode=disable
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: hatchet-lite:7077
      SERVER_GRPC_PORT: "7077"
      SERVER_URL: http://localhost:8888
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_DEFAULT_ENGINE_VERSION: "V1"
      SERVER_INTERNAL_CLIENT_INTERNAL_GRPC_BROADCAST_ADDRESS: hatchet-lite:7077
    volumes:
      - hatchet_config:/config
    depends_on:
      hatchet-postgres:
        condition: service_healthy

  hatchet-init:
    profiles:
      - init
    image: ghcr.io/hatchet-dev/hatchet/hatchet-admin:latest
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -s /shared/hatchet.token ]; then
          echo "Hatchet token already exists, skipping"
          exit 0
        fi
        for i in $$(seq 1 30); do
          if /hatchet/hatchet-admin --config /config token create --name repody > /shared/hatchet.token 2>/tmp/hatchet-init.err; then
            echo "Hatchet token created"
            exit 0
          fi
          echo "Waiting for Hatchet (attempt $$i)..."
          sleep 2
        done
        cat /tmp/hatchet-init.err >&2
        exit 1
    volumes:
      - hatchet_shared:/shared
      - hatchet_config:/config
    environment:
      DATABASE_URL: postgresql://hatchet:hatchet@hatchet-postgres:5432/hatchet?sslmode=disable
    depends_on:
      hatchet-lite:
        condition: service_started

  minio:
    image: ${REPODY_MINIO_IMAGE:-pgsty/minio:RELEASE.2026-04-17T00-00-00Z}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: api
    command: uvicorn audit_workbench.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      AUDIT_DATABASE_URL: postgresql+asyncpg://audit:audit@postgres:5432/audit_workbench
      AUDIT_REDIS_URL: redis://redis:6379/0
      AUDIT_CORS_ORIGINS: '["http://localhost:3000"]'
      AUDIT_STORAGE_BACKEND: s3
      AUDIT_MINIO_ENDPOINT: minio:9000
      AUDIT_MINIO_ACCESS_KEY: minioadmin
      AUDIT_MINIO_SECRET_KEY: minioadmin
      AUDIT_MINIO_BUCKET: audit-documents
      AUDIT_SEED_ON_STARTUP: "true"
      AUDIT_USE_CREATE_ALL: "false"
      AUDIT_RUN_MIGRATIONS_ON_STARTUP: "true"
      AUDIT_HATCHET_TASK_TIMEOUT_MINUTES: "3"
      AUDIT_STALE_RUN_TIMEOUT_MINUTES: "3"
      HATCHET_CLIENT_HOST_PORT: hatchet-lite:7077
      HATCHET_CLIENT_TLS_STRATEGY: none
      HATCHET_CLIENT_SERVER_URL: http://hatchet-lite:8888
      BUGSINK_DSN: ${BUGSINK_DSN:-}
      BUGSINK_ENVIRONMENT: ${BUGSINK_ENVIRONMENT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      hatchet-init:
        condition: service_completed_successfully
      minio:
        condition: service_started
    volumes:
      - ../../backend/src:/app/src
      - ../../backend/alembic:/app/alembic
      - ../../backend/alembic.ini:/app/alembic.ini
      - ../../backend/scripts:/app/scripts
      - hatchet_shared:/shared

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: worker
      args:
        BACKEND_EXTRAS: otel
    command: python -m audit_workbench.hatchet.worker
    environment:
      AUDIT_WORKER_POOL: ocr
      AUDIT_DATABASE_URL: postgresql+asyncpg://audit:audit@postgres:5432/audit_workbench
      AUDIT_REDIS_URL: redis://redis:6379/0
      AUDIT_STORAGE_BACKEND: s3
      AUDIT_MINIO_ENDPOINT: minio:9000
      AUDIT_MINIO_ACCESS_KEY: minioadmin
      AUDIT_MINIO_SECRET_KEY: minioadmin
      AUDIT_MINIO_BUCKET: audit-documents
      HATCHET_CLIENT_HOST_PORT: hatchet-lite:7077
      HATCHET_CLIENT_TLS_STRATEGY: none
      HATCHET_CLIENT_SERVER_URL: http://hatchet-lite:8888
      BUGSINK_DSN: ${BUGSINK_DSN:-}
      BUGSINK_ENVIRONMENT: ${BUGSINK_ENVIRONMENT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      hatchet-init:
        condition: service_completed_successfully
      minio:
        condition: service_started
    volumes:
      - ../../backend/src:/app/src
      - ../../backend/alembic:/app/alembic
      - ../../backend/alembic.ini:/app/alembic.ini
      - ../../backend/scripts:/app/scripts
      - hatchet_shared:/shared

  worker-fast:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: worker
    command: python -m audit_workbench.hatchet.worker
    environment:
      AUDIT_WORKER_POOL: fast
      AUDIT_DATABASE_URL: postgresql+asyncpg://audit:audit@postgres:5432/audit_workbench
      AUDIT_REDIS_URL: redis://redis:6379/0
      AUDIT_STORAGE_BACKEND: s3
      AUDIT_MINIO_ENDPOINT: minio:9000
      AUDIT_MINIO_ACCESS_KEY: minioadmin
      AUDIT_MINIO_SECRET_KEY: minioadmin
      AUDIT_MINIO_BUCKET: audit-documents
      HATCHET_CLIENT_HOST_PORT: hatchet-lite:7077
      HATCHET_CLIENT_TLS_STRATEGY: none
      HATCHET_CLIENT_SERVER_URL: http://hatchet-lite:8888
      BUGSINK_DSN: ${BUGSINK_DSN:-}
      BUGSINK_ENVIRONMENT: ${BUGSINK_ENVIRONMENT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      hatchet-init:
        condition: service_completed_successfully
      minio:
        condition: service_started
    volumes:
      - ../../backend/src:/app/src
      - ../../backend/alembic:/app/alembic
      - ../../backend/alembic.ini:/app/alembic.ini
      - ../../backend/scripts:/app/scripts
      - hatchet_shared:/shared

  web:
    profiles:
      - web
    build:
      context: ../..
      dockerfile: Dockerfile.web
      args:
        BACKEND_URL: http://api:8000
        NEXT_PUBLIC_BUGSINK_DSN: ${NEXT_PUBLIC_BUGSINK_DSN:-}
        BUGSINK_DSN: ${BUGSINK_DSN:-}
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://api:8000
      INTERNAL_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  miniodata:
  hatchet_pgdata:
  hatchet_config:
  hatchet_shared:
