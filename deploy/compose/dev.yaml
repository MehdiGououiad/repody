# Fast local development overrides.
# Usage: pnpm dev  (or pnpm compose up --stack=dev --only=infra|services)
# All-in-Docker web: pnpm compose up --stack=dev --only=web --profile=web-docker

services:
  api:
    command: uvicorn audit_workbench.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src --log-level debug
    environment:
      AUDIT_DEBUG: "true"
      AUDIT_DEPLOYMENT_ENVIRONMENT: development
      AUDIT_REPODY_VLM_WARMUP_ON_START: "false"
      AUDIT_OPERATOR_ACTIONS_ENABLED: "true"
      BUGSINK_DSN: ${BUGSINK_DSN:-}
      BUGSINK_ENVIRONMENT: ${BUGSINK_ENVIRONMENT:-development}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/healthz/live"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 120s
    volumes:
      - ../../e2e:/app/e2e:ro
      - ../../benchmark-reports:/app/benchmark-reports
    develop:
      watch:
        - path: ../../backend/src
          action: sync
          target: /app/src
          ignore:
            - "**/__pycache__/**"
            - "**/*.pyc"

  worker:
    environment:
      AUDIT_DEBUG: "true"
      AUDIT_DEPLOYMENT_ENVIRONMENT: development
      AUDIT_REPODY_VLM_WARMUP_ON_START: "false"
      BUGSINK_DSN: ${BUGSINK_DSN:-}
      BUGSINK_ENVIRONMENT: ${BUGSINK_ENVIRONMENT:-development}
    develop:
      watch:
        - path: ../../backend/src
          action: sync+restart
          target: /app/src
          ignore:
            - "**/__pycache__/**"
            - "**/*.pyc"

  worker-fast:
    environment:
      AUDIT_DEBUG: "true"
      AUDIT_DEPLOYMENT_ENVIRONMENT: development
      AUDIT_REPODY_VLM_WARMUP_ON_START: "false"
      BUGSINK_DSN: ${BUGSINK_DSN:-}
      BUGSINK_ENVIRONMENT: ${BUGSINK_ENVIRONMENT:-development}
    volumes:
      - ../../backend/src:/app/src
      - ../../backend/alembic:/app/alembic
      - ../../backend/alembic.ini:/app/alembic.ini
      - ../../backend/scripts:/app/scripts
    develop:
      watch:
        - path: ../../backend/src
          action: sync+restart
          target: /app/src
          ignore:
            - "**/__pycache__/**"
            - "**/*.pyc"

  web:
    profiles: !reset
      - web-docker
    build:
      context: ../..
      dockerfile: Dockerfile.web.dev
    command: ["pnpm", "dev", "--turbo", "-H", "0.0.0.0", "-p", "3000"]
    environment:
      BACKEND_URL: http://api:8000
      INTERNAL_API_URL: http://api:8000
      NEXT_ALLOWED_DEV_ORIGINS: host.docker.internal
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../..:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  web_node_modules:
