# GPU stack — Repody VLM via vLLM
#
# Deploy:
#   pnpm verify:gpu
#   pnpm compose up --stack=gpu --build
#
# Requires cpu.yaml in the same chain (worker-fast, Repody VLM tuning, Hatchet).
# NVIDIA GPU + Docker Compose GPU support required for the vllm service.

x-vllm-serve-command: &vllm-serve-command
  - vllm
  - serve
  - ${VLLM_SERVED_MODEL:-numind/NuExtract3}
  - --host
  - "0.0.0.0"
  - --port
  - "8000"
  - --trust-remote-code
  - --limit-mm-per-prompt
  - '{"image": 6, "video": 0}'
  - --chat-template-content-format
  - openai
  - --generation-config
  - vllm
  - --max-model-len
  - "${VLLM_MAX_MODEL_LEN:-16384}"
  - --speculative-config
  - '{"method": "qwen3_next_mtp", "num_speculative_tokens": 2}'

services:
  vllm:
    image: vllm/vllm-openai:latest
    command: *vllm-serve-command
    environment:
      HF_HOME: /root/.cache/huggingface
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 600s
    restart: unless-stopped

  api:
    depends_on:
      vllm:
        condition: service_healthy
    environment:
      AUDIT_INFERENCE_MODE: vllm
      AUDIT_VLLM_BASE_URL: http://vllm:8000/v1
      AUDIT_VLLM_SERVED_MODEL: ${VLLM_SERVED_MODEL:-numind/NuExtract3}
      AUDIT_REPODY_VLM_WARMUP_ON_START: "true"

  worker:
    depends_on:
      vllm:
        condition: service_healthy
    environment:
      AUDIT_INFERENCE_MODE: vllm
      AUDIT_VLLM_BASE_URL: http://vllm:8000/v1
      AUDIT_VLLM_SERVED_MODEL: ${VLLM_SERVED_MODEL:-numind/NuExtract3}
      AUDIT_REPODY_VLM_WARMUP_ON_START: "true"
      AUDIT_WORKER_OCR_MAX_JOBS: "1"

  worker-fast:
    environment:
      AUDIT_REPODY_VLM_WARMUP_ON_START: "false"

volumes:
  vllm_cache:
