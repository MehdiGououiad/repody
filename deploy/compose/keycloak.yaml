# Keycloak (OIDC) for Repody human authentication.
# Usage: pnpm compose up --stack=dev --with=auth --detach
# Admin console: http://localhost:${KEYCLOAK_HTTP_PORT:-8080} (admin / KEYCLOAK_ADMIN_PASSWORD)
# Realm: repody — users admin@repody.local / operator@repody.local (password: repody-dev)

services:
  keycloak:
    profiles:
      - auth
    image: ${REPODY_KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.6.3}
    command: start-dev --import-realm
    restart: unless-stopped
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8080}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-127.0.0.1}
      KC_HOSTNAME_PORT: ${KEYCLOAK_HTTP_PORT:-8080}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ../keycloak/realm-repody.json:/opt/keycloak/data/import/realm-repody.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  api:
    environment:
      AUDIT_OIDC_ENABLED: ${AUDIT_OIDC_ENABLED:-true}
      AUDIT_OIDC_ISSUER: ${AUDIT_OIDC_ISSUER:-http://127.0.0.1:8080/realms/repody}
      AUDIT_OIDC_JWKS_URL: ${AUDIT_OIDC_JWKS_URL:-http://keycloak:8080/realms/repody/protocol/openid-connect/certs}

  web:
    environment:
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET when using --with=auth}
      AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID:-repody-web}
      AUTH_KEYCLOAK_SECRET: ${AUTH_KEYCLOAK_CLIENT_SECRET:-repody-web-dev-secret}
      AUTH_KEYCLOAK_ISSUER: ${AUTH_KEYCLOAK_ISSUER:-http://127.0.0.1:8080/realms/repody}
