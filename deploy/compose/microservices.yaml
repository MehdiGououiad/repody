# Microservice image split — separate tags per role (cloud / K8s / independent deploy).
# Chain after prod stack: ... -f deploy/compose/microservices.yaml
#
# Build & tag:
#   REGISTRY=ghcr.io/yourorg TAG=1.0.0 pnpm images:build
# Push:
#   pnpm images:push

x-image-api: &image-api
  ${REPODY_IMAGE_REGISTRY:-}repody-api:${REPODY_IMAGE_TAG:-latest}
x-image-worker: &image-worker
  ${REPODY_IMAGE_REGISTRY:-}repody-worker:${REPODY_IMAGE_TAG:-latest}
x-image-web: &image-web
  ${REPODY_IMAGE_REGISTRY:-}repody-web:${REPODY_IMAGE_TAG:-latest}

services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: api
    image: *image-api

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: worker
    image: *image-worker

  worker-fast:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: worker
    image: *image-worker

  web:
    build:
      context: ../..
      dockerfile: Dockerfile.web
      args:
        # K8s images must bake the Helm service DNS into Next rewrites.
        # Compose prod keeps using http://api:8000 from deploy/compose/prod.yaml.
        BACKEND_URL: ${REPODY_WEB_BACKEND_URL:-http://repody-api:8000}
    image: *image-web
