# Enable Repody VLM warmup on the OCR worker pool.
# Usage: pnpm dev -- --warmup  |  pnpm compose up --stack=prod --warmup

services:
  api:
    environment:
      AUDIT_REPODY_VLM_WARMUP_ON_START: "true"

  worker:
    environment:
      AUDIT_REPODY_VLM_WARMUP_ON_START: "true"

  worker-fast:
    environment:
      AUDIT_REPODY_VLM_WARMUP_ON_START: "false"
