apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: local-bugsink-db
  namespace: repody
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-bugsink
    app.kubernetes.io/name: bugsink-db
spec:
  serviceName: local-bugsink-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bugsink-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bugsink-db
        app.kubernetes.io/component: local-bugsink
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: postgres:17.10-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: bugsinkuser
            - name: POSTGRES_DB
              value: bugsink
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: local-bugsink-secrets
                  key: BUGSINK_DB_PASSWORD
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -h
                - localhost
                - -U
                - bugsinkuser
                - -d
                - bugsink
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: local-bugsink-db
---
apiVersion: v1
kind: Service
metadata:
  name: local-bugsink-db
  namespace: repody
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-bugsink
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: bugsink-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-bugsink
  namespace: repody
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-bugsink
    app.kubernetes.io/name: bugsink
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bugsink
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bugsink
        app.kubernetes.io/component: local-bugsink
    spec:
      automountServiceAccountToken: false
      containers:
        - name: bugsink
          image: bugsink/bugsink:2
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: local-bugsink-secrets
                  key: BUGSINK_SECRET_KEY
            - name: CREATE_SUPERUSER
              value: admin@example.com:admin
            - name: PORT
              value: "8000"
            - name: BASE_URL
              value: http://bugsink.repody.local
            - name: BEHIND_HTTPS_PROXY
              value: "false"
            - name: USE_X_FORWARDED_HOST
              value: "false"
            - name: BUGSINK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: local-bugsink-secrets
                  key: BUGSINK_DB_PASSWORD
            - name: DATABASE_URL
              value: postgresql://bugsinkuser:$(BUGSINK_DB_PASSWORD)@local-bugsink-db:5432/bugsink
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: bugsink.repody.local
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: bugsink.repody.local
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
---
