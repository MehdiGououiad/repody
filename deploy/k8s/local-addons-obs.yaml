apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-grafana
  namespace: repody
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-observability
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: local-observability
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:12.4.1
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: audit
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: http://grafana.repody.local
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/loki.yaml
              subPath: loki.yaml
              readOnly: true
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/tempo.yaml
              subPath: tempo.yaml
              readOnly: true
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
              readOnly: true
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/json/platform-logs.json
              subPath: platform-logs.json
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: local-grafana
        - name: provisioning
          configMap:
            name: local-grafana-provisioning
---
