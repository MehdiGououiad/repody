apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-loki
  namespace: repody
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-observability
    app.kubernetes.io/name: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
        app.kubernetes.io/component: local-observability
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10001
      containers:
        - name: loki
          image: grafana/loki:3.6.11
          args:
            - -config.file=/etc/loki/local-config.yaml
          ports:
            - name: http
              containerPort: 3100
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/loki
              readOnly: true
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: local-loki-config
        - name: data
          persistentVolumeClaim:
            claimName: local-loki
---
