apiVersion: v1
kind: ConfigMap
metadata:
  name: local-loki-config
  namespace: repody
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-observability
data:
  local-config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache
      filesystem:
        directory: /loki/chunks

    limits_config:
      retention_period: 168h
      reject_old_samples: true
      reject_old_samples_max_age: 168h

    analytics:
      reporting_enabled: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-promtail-config
  namespace: repody
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-observability
data:
  config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://local-loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: component
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
            target_label: instance
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            regex: control
            target_label: service
            replacement: api
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            regex: worker-ocr
            target_label: service
            replacement: worker
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            regex: worker-fast
            target_label: service
            replacement: worker-fast
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            regex: edge
            target_label: service
            replacement: web
          - source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            separator: /
            target_label: __path__
            replacement: /var/log/pods/*$1/$2/*.log
        pipeline_stages:
          - cri: {}
          - match:
              selector: '{namespace="repody", service=~"api|worker|worker-fast"}'
              stages:
                - json:
                    expressions:
                      level: level
                      event: event
                      body: body
                      run_id: run_id
                      request_id: request_id
                      workflow_id: workflow_id
                      trace_id: trace_id
                      span_id: span_id
                      event_domain: event_domain
                - structured_metadata:
                    level:
                    event:
                    run_id:
                    request_id:
                    workflow_id:
                    trace_id:
                    span_id:
                    event_domain:
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-tempo-config
  namespace: repody
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-observability
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 168h

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    metrics_generator:
      registry:
        external_labels:
          source: tempo
      storage:
        path: /var/tempo/generator/wal

    overrides:
      defaults:
        metrics_generator:
          processors: [service-graphs, span-metrics]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-grafana-provisioning
  namespace: repody
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-observability
data:
  loki.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://local-loki:3100
        isDefault: true
        editable: false
        jsonData:
          maxLines: 1000
  tempo.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://local-tempo:3200
        editable: false
        jsonData:
          tracesToLogs:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false
          nodeGraph:
            enabled: true
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: repody
        orgId: 1
        folder: Repody
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards/json
  platform-logs.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 18, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=\"repody\", service=~\"api|worker|worker-fast\"}",
              "refId": "A"
            }
          ],
          "title": "Repody platform logs",
          "type": "logs"
        }
      ],
      "schemaVersion": 39,
      "tags": ["repody", "local"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "Platform logs",
      "uid": "repody-platform-logs",
      "version": 1,
      "weekStart": ""
    }
---
