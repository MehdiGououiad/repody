apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: local-promtail
  namespace: repody
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-observability
    app.kubernetes.io/name: promtail
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
        app.kubernetes.io/component: local-observability
    spec:
      serviceAccountName: local-promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.6.11
          env:
            # Promtail keeps only pods scheduled on $HOSTNAME; default hostname is the pod name.
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          args:
            - -config.file=/etc/promtail/config.yml
          ports:
            - name: http
              containerPort: 9080
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
              readOnly: true
            - name: run
              mountPath: /run/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: local-promtail-config
        - name: run
          emptyDir: {}
        - name: pods
          hostPath:
            path: /var/log/pods
---
