apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-repody-gateway-to-argocd-server
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-gitops
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: repody-app
  to:
    - group: ""
      kind: Service
      name: argocd-server
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: local-argocd
  namespace: repody-app
  labels:
    app.kubernetes.io/part-of: repody
    app.kubernetes.io/component: local-gitops
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: repody
  hostnames:
    - argocd.repody.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          namespace: argocd
          port: 80
