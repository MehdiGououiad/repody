# kind cluster for local dev — pulls images from Harbor (pnpm harbor:bootstrap).
# Harbor proxy must be on the kind Docker network — run: pnpm harbor:connect-kind
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: repody-local
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."harbor.repody.lvh.me:8080"]
      endpoint = ["http://harbor.repody.lvh.me:8080"]
    [plugins."io.containerd.grpc.v1.cri".registry.configs."harbor.repody.lvh.me:8080".tls]
      insecure_skip_verify = true
