# Envoy data-plane Service: fixed NodePort for kind (host :80 -> node :30080).
# Referenced from the Repody Gateway via gatewayApi.envoyProxyName in values-local.yaml.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: repody-kind-nodeport
  namespace: repody
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: NodePort
        externalTrafficPolicy: Local
        patch:
          type: StrategicMerge
          value:
            spec:
              ports:
                - port: 80
                  nodePort: 30080
