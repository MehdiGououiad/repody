global:
  imagePullSecrets: []
  deploymentEnvironment: production
  openshift:
    enabled: false
    routes:
      enabled: false
      authHost: ""

ingress:
  enabled: false
  className: ""
  host: ""
  annotations: {}
  tls:
    enabled: true
    secretName: repody-tls

gatewayConsumerNamespace: repody

keycloak:
  enabled: false
  image: quay.io/keycloak/keycloak:26.6.4
  realm: repody
  hostname: auth.example.com
  hostnameStrict: false
  hostnameStrictHttps: false
  proxyHeaders: xforwarded
  adminUsername: admin
  adminPassword: ""
  # Production / lab: set existingSecret (e.g. repody-runtime-secrets) and store KEYCLOAK_ADMIN_PASSWORD in Vault.
  existingSecret: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
