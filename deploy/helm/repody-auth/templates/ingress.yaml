{{- if and .Values.ingress.enabled .Values.keycloak.enabled }}
{{- $host := .Values.ingress.host | default .Values.keycloak.hostname }}
{{- if $host }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "repody-auth.fullname" . }}-keycloak
  labels:
    {{- include "repody-auth.labels" . | nindent 4 }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ required "ingress.tls.secretName is required when ingress.tls.enabled" .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
{{- end }}
{{- end }}
