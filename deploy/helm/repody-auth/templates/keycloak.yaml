{{- if .Values.keycloak.enabled }}
{{- $hostnameUrl := .Values.keycloak.hostnameUrl }}
{{- if not $hostnameUrl }}
{{- if and .Values.ingress.enabled .Values.ingress.tls.enabled }}
{{- $hostnameUrl = printf "https://%s" .Values.keycloak.hostname }}
{{- else }}
{{- $hostnameUrl = .Values.keycloak.hostname }}
{{- end }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "repody-auth.fullname" . }}-keycloak-realm
  labels:
    {{- include "repody-auth.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
data:
  realm-repody.json: |
{{ .Files.Get "files/realm-repody.json" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "repody-auth.fullname" . }}-keycloak
  labels:
    {{- include "repody-auth.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "repody-auth.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: auth
  template:
    metadata:
      labels:
        {{- include "repody-auth.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: auth
    spec:
      {{- include "repody-auth.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image | quote }}
          {{- if .Values.global.openshift.enabled }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          {{- end }}
          args:
            - start
            - --import-realm
            {{- if .Values.keycloak.httpEnabled }}
            - --http-enabled=true
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUsername | quote }}
            {{- if .Values.keycloak.existingSecret }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.existingSecret }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            {{- else }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: {{ required "keycloak.adminPassword when keycloak.enabled and no existingSecret" .Values.keycloak.adminPassword | quote }}
            {{- end }}
            - name: KC_HTTP_PORT
              value: "8080"
            {{- if .Values.keycloak.httpEnabled }}
            - name: KC_HTTP_ENABLED
              value: "true"
            {{- end }}
            - name: KC_HOSTNAME
              value: {{ $hostnameUrl | quote }}
            - name: KC_HOSTNAME_STRICT
              value: {{ .Values.keycloak.hostnameStrict | quote }}
            {{- if .Values.keycloak.proxyHeaders }}
            - name: KC_PROXY_HEADERS
              value: {{ .Values.keycloak.proxyHeaders | quote }}
            {{- end }}
            - name: KC_HEALTH_ENABLED
              value: "true"
            {{- if .Values.keycloak.database.enabled }}
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: {{ .Values.keycloak.database.host | quote }}
            - name: KC_DB_URL_PORT
              value: {{ .Values.keycloak.database.port | quote }}
            - name: KC_DB_URL_DATABASE
              value: {{ .Values.keycloak.database.name | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.database.username | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "keycloak.existingSecret required when keycloak.database.enabled" .Values.keycloak.existingSecret }}
                  key: {{ .Values.keycloak.database.passwordKey | quote }}
            {{- end }}
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          startupProbe:
            httpGet:
              path: /health/started
              port: management
            initialDelaySeconds: {{ .Values.keycloak.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.keycloak.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.keycloak.probes.startup.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            periodSeconds: {{ .Values.keycloak.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.keycloak.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            periodSeconds: {{ .Values.keycloak.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.keycloak.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
      volumes:
        - name: realm-import
          configMap:
            name: {{ include "repody-auth.fullname" . }}-keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    {{- include "repody-auth.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
spec:
  type: ClusterIP
  selector:
    {{- include "repody-auth.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: auth
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-repody-app-gateway-to-keycloak
  labels:
    {{- include "repody-auth.labels" . | nindent 4 }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ required "gatewayConsumerNamespace is required when keycloak.enabled" .Values.gatewayConsumerNamespace | quote }}
  to:
    - group: ""
      kind: Service
      name: keycloak
{{- end }}
