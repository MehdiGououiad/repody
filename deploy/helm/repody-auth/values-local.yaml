# Local kind — Keycloak in repody-auth namespace.
global:
  deploymentEnvironment: local
  imageRegistry: harbor.repody.lvh.me:8080/repody
  security:
    allowInsecureImages: true

gatewayConsumerNamespace: repody-app

keycloak:
  enabled: true
  hostname: auth.repody.local
  hostnameStrict: false
  hostnameStrictHttps: false
  proxyHeaders: xforwarded
  adminPassword: admin
