# Local kind — Hatchet in repody-queue namespace.
global:
  deploymentEnvironment: local
  imageRegistry: harbor.repody.lvh.me:8080/repody
  security:
    allowInsecureImages: true

hatchet:
  enabled: true
  waitInitImage: busybox:1.37.0

hatchet-stack:
  sharedConfig:
    serverUrl: http://repody-hatchet-api:8080
    serverAuthCookieDomain: localhost
    grpcBroadcastAddress: repody-hatchet-engine:7070
    env:
      SERVER_OTEL_COLLECTOR_URL: local-tempo.repody-app.svc.cluster.local:4317
      SERVER_OTEL_INSECURE: "true"
      SERVER_OTEL_TRACE_ID_RATIO: "1"
  api:
    env:
      SERVER_OTEL_SERVICE_NAME: hatchet-api
    initContainers:
      - name: wait-rabbitmq
        image: busybox:1.37.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-ec"]
        args:
          - |
            until nc -z repody-queue-rabbitmq 5672; do
              echo "waiting for RabbitMQ";
              sleep 2;
            done
  engine:
    env:
      SERVER_OTEL_SERVICE_NAME: hatchet-engine
    initContainers:
      - name: wait-rabbitmq
        image: busybox:1.37.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-ec"]
        args:
          - |
            until nc -z repody-queue-rabbitmq 5672; do
              echo "waiting for RabbitMQ";
              sleep 2;
            done
