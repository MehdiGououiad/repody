# Local kind cluster overrides — Gateway API edge, single replica, dev secrets.
# Platform data/queue/auth run in separate namespaces (repody-data, repody-queue, repody-auth).

global:
  deploymentEnvironment: local
  imageRegistry: harbor.repody.lvh.me:8080/repody
  security:
    allowInsecureImages: true

externalDatabase:
  enabled: true
  existingSecret: ""
  url: postgresql+asyncpg://audit:audit-local-k8s@repody-data-postgresql.repody-data.svc.cluster.local:5432/audit_workbench
  host: repody-data-postgresql.repody-data.svc.cluster.local
  port: 5432

externalRedis:
  enabled: true
  existingSecret: ""
  url: redis://repody-data-redis-master.repody-data.svc.cluster.local:6379/0

externalObjectStorage:
  enabled: true
  existingSecret: ""
  endpoint: repody-data-minio.repody-data.svc.cluster.local:9000
  bucket: audit-documents
  accessKey: minioadmin
  secretKey: minio-local-k8s
  secure: false
  publicEndpoint: files.repody.local

externalHatchet:
  enabled: true
  existingSecret: hatchet-client-config
  tokenKey: HATCHET_CLIENT_TOKEN
  waitForTokenSecret: true
  hostPort: repody-queue-hatchet-engine.repody-queue.svc.cluster.local:7070
  serverUrl: http://repody-queue-hatchet-api.repody-queue.svc.cluster.local:8080
  tlsStrategy: none

networkPolicy:
  enabled: false

api:
  replicas: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

workerOcr:
  replicas: 1
  warmupOnStart: false
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1536Mi

workerFast:
  replicas: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi

web:
  replicas: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

keycloak:
  enabled: false

ingress:
  enabled: false

gatewayApi:
  enabled: true
  createGatewayClass: true
  gatewayClassName: eg
  gatewayClassControllerName: gateway.envoyproxy.io/gatewayclass-controller
  host: app.repody.local
  apiHost: api.repody.local
  filesHost: files.repody.local
  authHost: auth.repody.local
  authServiceName: keycloak
  authServiceNamespace: repody-auth
  authServicePort: 8080
  filesServiceName: repody-data-minio
  filesServiceNamespace: repody-data
  filesServicePort: 9000
  authHostAliasInitImage: ""
  # kind: EnvoyProxy below pins NodePort 30080 (maps to host :80 via kind-repody-local.yaml).
  envoyProxyName: repody-kind-nodeport
  kindNodePort: 30080

hatchet:
  enabled: false
  waitInitImage: busybox:1.37.0

secrets:
  create: true
  existingSecret: ""
  authSecret: local-k8s-auth-secret-32chars-min!
  keycloakClientSecret: repody-web-dev-secret

config:
  oidcEnabled: true
  authUrl: http://app.repody.local
  oidcIssuer: http://auth.repody.local/realms/repody
  oidcIssuerAliases:
    - http://auth.repody.local:8080/realms/repody
    - http://keycloak.repody-auth.svc.cluster.local:8080/realms/repody
  oidcInternalIssuer: http://keycloak.repody-auth.svc.cluster.local:8080/realms/repody
  oidcJwksUrl: http://keycloak.repody-auth.svc.cluster.local:8080/realms/repody/protocol/openid-connect/certs
  keycloakAdminUrl: http://keycloak.repody-auth.svc.cluster.local:8080
  keycloakAdminUsername: admin
  keycloakAdminPassword: admin
  oidcAudience: repody-api
  keycloakClientId: repody-web
  corsOrigins: '["http://app.repody.local"]'
  inferenceMode: vllm
  vllmBaseUrl: http://host.docker.internal:8000/v1
  vllmServedModel: nuextract3-q8_0
  dockerModelRunnerBaseUrl: ""
  repodyVlmPdfDpi: 170
  repodyVlmMaxEdgePx: ""
  ocrMaxPages: 4
  suryaOcrEnabled: true
  suryaInferenceBackend: llamacpp
  suryaInferenceUrl: http://host.docker.internal:8001/v1
  suryaInferenceParallel: 8
  operatorActionsEnabled: true
  operatorBenchmarkUser: operator@repody.local
  operatorBenchmarkPassword: repody-dev
  repodyVlmMarkdownOnExtract: true
  gpuLiveProbe: false
  logJson: true

migrations:
  enabled: false

observability:
  otelEnabled: false
  otelEndpoint: http://local-tempo:4318/v1/traces

postgresql:
  enabled: false

redis:
  enabled: false

minio:
  enabled: false
