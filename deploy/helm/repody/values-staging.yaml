# Staging overrides — GHCR registry, Gateway API edge, in-cluster Keycloak + CPU vLLM.
# Copy/adapt for your cluster; keep secrets out of Git (use secrets.existingSecret).
# GitOps promotion: deploy/scripts/gitops-promote-staging.mjs

global:
  deploymentEnvironment: staging
  imagePullSecrets:
    - name: registry-pull-secret

images:
  backend:
    repository: ghcr.io/yourorg/repody/repody-backend
    tag: "<git-sha>"
    pullPolicy: IfNotPresent
  api:
    repository: ghcr.io/yourorg/repody/repody-backend
    tag: "<git-sha>"
    pullPolicy: IfNotPresent
  worker:
    repository: ghcr.io/yourorg/repody/repody-backend
    tag: "<git-sha>"
    pullPolicy: IfNotPresent
  web:
    repository: ghcr.io/yourorg/repody/repody-web
    tag: "<git-sha>"
    pullPolicy: IfNotPresent

api:
  replicas: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false

workerExtract:
  replicas: 1
  warmupOnStart: false
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false

workerFast:
  replicas: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false

web:
  replicas: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false

ingress:
  enabled: false

gatewayApi:
  enabled: true
  createGatewayClass: false
  gatewayClassName: envoy-gateway
  host: app.staging.yourdomain.com
  apiHost: api.staging.yourdomain.com
  filesHost: files.staging.yourdomain.com
  authHost: ""
  authServiceName: ""
  authServicePort: 8080

keycloak:
  enabled: false
  hostname: auth.staging.yourdomain.com
  hostnameStrict: false
  hostnameStrictHttps: false
  proxyHeaders: xforwarded
  existingSecret: repody-runtime-secrets
  adminPassword: ""  # Prefer KEYCLOAK_ADMIN_PASSWORD from keycloak.existingSecret.

externalDatabase:
  enabled: true
  existingSecret: repody-runtime-secrets
  urlKey: AUDIT_DATABASE_URL

externalRedis:
  enabled: true
  existingSecret: repody-runtime-secrets
  urlKey: AUDIT_REDIS_URL

externalObjectStorage:
  enabled: true
  endpoint: s3.staging.yourdomain.com
  bucket: audit-documents
  existingSecret: repody-runtime-secrets
  accessKeyKey: AUDIT_MINIO_ACCESS_KEY
  secretKeyKey: AUDIT_MINIO_SECRET_KEY
  secure: true
  publicEndpoint: files.staging.yourdomain.com

secrets:
  create: false
  existingSecret: repody-runtime-secrets

networkPolicy:
  enabled: true

config:
  oidcEnabled: true
  authUrl: https://app.staging.yourdomain.com
  oidcIssuer: https://auth.staging.yourdomain.com/realms/repody
  oidcAudience: repody-api
  keycloakClientId: repody-web
  corsOrigins: '["https://app.staging.yourdomain.com"]'
  inferenceMode: vllm
  # External OpenAI-compatible endpoint: vLLM, llama-server, or managed GPU service.
  vllmBaseUrl: https://vlm.staging.yourdomain.com/v1
  vllmServedModel: numind/NuExtract3
  dockerModelRunnerBaseUrl: ""
  repodyVlmPdfDpi: 170
  repodyVlmMaxEdgePx: ""
  ocrMaxPages: 4
  logJson: true

postgresql:
  enabled: false

redis:
  enabled: false

minio:
  enabled: false

observability:
  bugsinkDsn: ""
  otelEnabled: true
  otelEndpoint: http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces
