apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "repody.fullname" . }}-web
  labels:
    {{- include "repody.labels" . | nindent 4 }}
    app.kubernetes.io/component: edge
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "repody.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: edge
  template:
    metadata:
      labels:
        {{- include "repody.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: edge
    spec:
      automountServiceAccountToken: false
      {{- if .Values.web.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.web.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.web.topologySpreadConstraints.topologyKey | quote }}
          whenUnsatisfiable: {{ .Values.web.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "repody.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: edge
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      {{- include "repody.imagePullSecrets" . | nindent 6 }}
      {{- $authHost := .Values.gatewayApi.authHost }}
      {{- $authSvc := .Values.gatewayApi.authServiceName | default "keycloak" }}
      {{- $authHostAliasIp := .Values.gatewayApi.authHostAliasIp }}
      {{- $authHostInit := and .Values.gatewayApi.enabled $authHost .Values.keycloak.enabled (not $authHostAliasIp) }}
      {{- if and .Values.gatewayApi.enabled $authHost $authHostAliasIp }}
      hostAliases:
        - ip: {{ $authHostAliasIp | quote }}
          hostnames:
            - {{ $authHost | quote }}
      {{- end }}
      {{- if $authHostInit }}
      initContainers:
        - name: auth-host-alias
          image: {{ .Values.keycloak.authHostAliasInitImage | default .Values.hatchet.waitInitImage | quote }}
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          command:
            - sh
            - -ec
            - |
              AUTH_FQDN="{{ $authSvc }}.{{ .Release.Namespace }}.svc.cluster.local"
              for i in $(seq 1 90); do
                KC_IP=$(nslookup "$AUTH_FQDN" 2>/dev/null | awk '/^Address [0-9]+: / { print $3; exit }')
                if [ -z "$KC_IP" ]; then
                  KC_IP=$(ping -c1 -W2 "$AUTH_FQDN" 2>/dev/null | sed -n 's/.*(\([0-9.]*\)).*/\1/p' | head -1)
                fi
                if [ -n "$KC_IP" ]; then
                  cp /etc/hosts /hosts-volume/hosts
                  echo "${KC_IP} {{ $authHost }}" >> /hosts-volume/hosts
                  exit 0
                fi
                sleep 2
              done
              echo "timed out waiting for ${AUTH_FQDN}" >&2
              exit 1
          volumeMounts:
            - name: etc-hosts
              mountPath: /hosts-volume
      volumes:
        - name: etc-hosts
          emptyDir: {}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.images.web.repository }}:{{ .Values.images.web.tag }}"
          imagePullPolicy: {{ .Values.images.web.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
          {{- if $authHostInit }}
          volumeMounts:
            - name: etc-hosts
              mountPath: /etc/hosts
              subPath: hosts
          {{- end }}
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: BACKEND_URL
              value: http://{{ include "repody.fullname" . }}-api:8000
            - name: INTERNAL_API_URL
              value: http://{{ include "repody.fullname" . }}-api:8000
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "repody.secretName" . }}
                  key: AUTH_SECRET
            - name: AUTH_KEYCLOAK_ID
              value: {{ .Values.config.keycloakClientId | quote }}
            - name: AUTH_KEYCLOAK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "repody.secretName" . }}
                  key: AUTH_KEYCLOAK_CLIENT_SECRET
            - name: AUTH_KEYCLOAK_ISSUER
              value: {{ required "config.oidcIssuer" .Values.config.oidcIssuer | quote }}
            {{- if .Values.config.oidcInternalIssuer }}
            - name: AUTH_KEYCLOAK_INTERNAL_ISSUER
              value: {{ .Values.config.oidcInternalIssuer | quote }}
            {{- end }}
            {{- if .Values.config.authUrl }}
            - name: AUTH_URL
              value: {{ .Values.config.authUrl | quote }}
            {{- end }}
            {{- include "repody.webBugsinkEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "repody.fullname" . }}-web
  labels:
    {{- include "repody.labels" . | nindent 4 }}
    app.kubernetes.io/component: edge
spec:
  type: ClusterIP
  selector:
    {{- include "repody.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: edge
  ports:
    - name: http
      port: 3000
      targetPort: http
