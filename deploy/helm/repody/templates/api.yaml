apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "repody.fullname" . }}-api
  labels:
    {{- include "repody.labels" . | nindent 4 }}
    app.kubernetes.io/component: control
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "repody.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control
  template:
    metadata:
      labels:
        {{- include "repody.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      {{- include "repody.imagePullSecrets" . | nindent 6 }}
      {{- if and .Values.hatchet.enabled (not .Values.hatchet.clientToken) .Values.hatchet.bootstrapToken }}
      initContainers:
        {{- include "repody.waitHatchetTokenInit" . | nindent 8 }}
      volumes:
        - name: hatchet-client-token
          secret:
            secretName: {{ include "repody.fullname" . }}-hatchet-token
            optional: true
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "repody.fullname" . }}-config
          env:
            - name: AUDIT_OTEL_SERVICE_NAME
              value: repody-api
            {{- include "repody.dataPlaneEnv" . | nindent 12 }}
            - name: AUDIT_OIDC_ISSUER
              value: {{ required "config.oidcIssuer" .Values.config.oidcIssuer | quote }}
            {{- $jwks := .Values.config.oidcJwksUrl }}
            {{- if and (not $jwks) .Values.keycloak.enabled }}
            {{- $jwks = include "repody.keycloakJwksUrl" . }}
            {{- end }}
            {{- if $jwks }}
            - name: AUDIT_OIDC_JWKS_URL
              value: {{ $jwks | quote }}
            {{- end }}
            {{- if .Values.keycloak.enabled }}
            - name: KEYCLOAK_ADMIN_URL
              value: {{ include "repody.keycloakAdminUrl" . | quote }}
            - name: KEYCLOAK_ADMIN_USER
              value: {{ .Values.keycloak.adminUsername | quote }}
            {{- if .Values.keycloak.existingSecret }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.existingSecret }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            {{- else }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ required "keycloak.adminPassword when keycloak.enabled and no existingSecret" .Values.keycloak.adminPassword | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.observability.bugsinkDsn }}
            - name: BUGSINK_DSN
              value: {{ .Values.observability.bugsinkDsn | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /v1/healthz/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/healthz/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "repody.fullname" . }}-api
  labels:
    {{- include "repody.labels" . | nindent 4 }}
    app.kubernetes.io/component: control
spec:
  type: ClusterIP
  selector:
    {{- include "repody.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control
  ports:
    - name: http
      port: 8000
      targetPort: http
