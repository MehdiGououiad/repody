apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "repody.fullname" . }}-api
  labels:
    {{- include "repody.labels" . | nindent 4 }}
    app.kubernetes.io/component: control
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "repody.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control
  template:
    metadata:
      labels:
        {{- include "repody.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control
    spec:
      automountServiceAccountToken: false
      {{- if .Values.api.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.api.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.api.topologySpreadConstraints.topologyKey | quote }}
          whenUnsatisfiable: {{ .Values.api.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "repody.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: control
      {{- end }}
      securityContext:
        {{- include "repody.podSecurityContext" . | nindent 8 }}
      {{- include "repody.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: api
          image: {{ include "repody.backendImage" . | quote }}
          imagePullPolicy: {{ include "repody.backendImagePullPolicy" . }}
          {{- /* Image ENTRYPOINT runs migrations when migrations.enabled=false (configmap sets AUDIT_RUN_MIGRATIONS_ON_STARTUP). */}}
          args:
            - uvicorn
            - audit_workbench.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            {{- if .Values.dev.apiReload }}
            - --reload
            {{- end }}
          securityContext:
            {{- include "repody.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "repody.fullname" . }}-config
          env:
            - name: AUDIT_OTEL_SERVICE_NAME
              value: repody-api
            {{- include "repody.vllmSecretEnv" . | nindent 12 }}
            {{- include "repody.dataPlaneEnv" . | nindent 12 }}
            - name: AUDIT_OIDC_ISSUER
              value: {{ required "config.oidcIssuer" .Values.config.oidcIssuer | quote }}
            {{- $jwks := .Values.config.oidcJwksUrl }}
            {{- if and (not $jwks) .Values.keycloak.enabled }}
            {{- $jwks = include "repody.keycloakJwksUrl" . }}
            {{- end }}
            {{- if $jwks }}
            - name: AUDIT_OIDC_JWKS_URL
              value: {{ $jwks | quote }}
            {{- end }}
            {{- if .Values.keycloak.enabled }}
            - name: KEYCLOAK_ADMIN_URL
              value: {{ include "repody.keycloakAdminUrl" . | quote }}
            - name: KEYCLOAK_ADMIN_USER
              value: {{ .Values.keycloak.adminUsername | quote }}
            {{- if .Values.keycloak.existingSecret }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.existingSecret }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            {{- else }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ required "keycloak.adminPassword when keycloak.enabled and no existingSecret" .Values.keycloak.adminPassword | quote }}
            {{- end }}
            {{- else if .Values.config.keycloakAdminUrl }}
            - name: KEYCLOAK_ADMIN_URL
              value: {{ .Values.config.keycloakAdminUrl | quote }}
            - name: KEYCLOAK_ADMIN_USER
              value: {{ .Values.config.keycloakAdminUsername | default "admin" | quote }}
            {{- if .Values.config.keycloakAdminPassword }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.config.keycloakAdminPassword | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.secrets.keycloakClientSecret }}
            - name: AUDIT_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "repody.secretName" . }}
                  key: AUTH_KEYCLOAK_CLIENT_SECRET
            {{- end }}
            {{- include "repody.bugsinkEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/healthz/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "repody.fullname" . }}-api
  labels:
    {{- include "repody.labels" . | nindent 4 }}
    app.kubernetes.io/component: control
spec:
  type: ClusterIP
  selector:
    {{- include "repody.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control
  ports:
    - name: http
      port: 8000
      targetPort: http
