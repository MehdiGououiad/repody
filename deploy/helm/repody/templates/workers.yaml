apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "repody.fullname" . }}-worker-ocr
  labels:
    {{- include "repody.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-ocr
spec:
  replicas: {{ .Values.workerOcr.replicas }}
  selector:
    matchLabels:
      {{- include "repody.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker-ocr
  template:
    metadata:
      labels:
        {{- include "repody.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker-ocr
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.workerOcr.terminationGracePeriodSeconds }}
      {{- if .Values.workerOcr.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.workerOcr.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.workerOcr.topologySpreadConstraints.topologyKey | quote }}
          whenUnsatisfiable: {{ .Values.workerOcr.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "repody.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: worker-ocr
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      {{- include "repody.imagePullSecrets" . | nindent 6 }}
      {{- if or (and .Values.hatchet.enabled (not .Values.hatchet.clientToken)) (and .Values.externalHatchet.enabled .Values.externalHatchet.waitForTokenSecret) }}
      initContainers:
        {{- include "repody.waitHatchetTokenInit" . | nindent 8 }}
      volumes:
        - name: hatchet-client-token
          secret:
            secretName: {{ include "repody.hatchetTokenSecretName" . }}
            optional: true
      {{- end }}
      containers:
        - name: worker
          image: {{ include "repody.backendImage" . | quote }}
          imagePullPolicy: {{ include "repody.backendImagePullPolicy" . }}
          command:
            - python
            - -m
            - audit_workbench.hatchet.worker
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: {{ include "repody.fullname" . }}-config
          env:
            - name: AUDIT_RUN_MIGRATIONS_ON_STARTUP
              value: "false"
            - name: AUDIT_WORKER_POOL
              value: {{ .Values.workerOcr.pool | quote }}
            - name: AUDIT_WORKER_OCR_MAX_JOBS
              value: {{ .Values.workerOcr.maxJobs | quote }}
            - name: AUDIT_REPODY_VLM_WARMUP_ON_START
              value: {{ .Values.workerOcr.warmupOnStart | quote }}
            - name: AUDIT_OTEL_SERVICE_NAME
              value: repody-worker-ocr
            {{- include "repody.vllmSecretEnv" . | nindent 12 }}
            {{- include "repody.dataPlaneEnv" . | nindent 12 }}
            {{- include "repody.bugsinkEnv" . | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - python -c "import pathlib,sys; needle='audit_workbench.hatchet.worker'; sys.exit(0 if any(needle in p.read_text(errors='ignore').replace('\\x00',' ') for p in pathlib.Path('/proc').glob('[0-9]*/cmdline')) else 1)"
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.workerOcr.resources | nindent 12 }}
---
