apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "repody.fullname" . }}-worker-ocr
  labels:
    {{- include "repody.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-ocr
spec:
  replicas: {{ .Values.workerOcr.replicas }}
  selector:
    matchLabels:
      {{- include "repody.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker-ocr
  template:
    metadata:
      labels:
        {{- include "repody.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker-ocr
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      {{- include "repody.imagePullSecrets" . | nindent 6 }}
      {{- if and .Values.hatchet.enabled (not .Values.hatchet.clientToken) .Values.hatchet.bootstrapToken }}
      initContainers:
        {{- include "repody.waitHatchetTokenInit" . | nindent 8 }}
      volumes:
        - name: hatchet-client-token
          secret:
            secretName: {{ include "repody.fullname" . }}-hatchet-token
            optional: true
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.images.worker.repository }}:{{ .Values.images.worker.tag }}"
          imagePullPolicy: {{ .Values.images.worker.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: {{ include "repody.fullname" . }}-config
          env:
            - name: AUDIT_RUN_MIGRATIONS_ON_STARTUP
              value: "false"
            - name: AUDIT_WORKER_POOL
              value: {{ .Values.workerOcr.pool | quote }}
            - name: AUDIT_WORKER_OCR_MAX_JOBS
              value: {{ .Values.workerOcr.maxJobs | quote }}
            - name: AUDIT_REPODY_VLM_WARMUP_ON_START
              value: {{ .Values.workerOcr.warmupOnStart | quote }}
            - name: AUDIT_OTEL_SERVICE_NAME
              value: repody-worker-ocr
            {{- include "repody.vllmSecretEnv" . | nindent 12 }}
            {{- include "repody.dataPlaneEnv" . | nindent 12 }}
            {{- if .Values.observability.bugsinkDsn }}
            - name: BUGSINK_DSN
              value: {{ .Values.observability.bugsinkDsn | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.workerOcr.resources | nindent 12 }}
---
