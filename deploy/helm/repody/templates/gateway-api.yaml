{{- if .Values.gatewayApi.enabled }}
{{- if .Values.gatewayApi.createGatewayClass }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gatewayApi.gatewayClassName | quote }}
  labels:
    {{- include "repody.labels" . | nindent 4 }}
spec:
  controllerName: {{ .Values.gatewayApi.gatewayClassControllerName | quote }}
---
{{- end }}
{{- if or .Values.gatewayApi.authExternalName .Values.gatewayApi.authExternalAddress }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "repody.fullname" . }}-auth-external
  labels:
    {{- include "repody.labels" . | nindent 4 }}
spec:
  {{- if .Values.gatewayApi.authExternalAddress }}
  type: ClusterIP
  {{- else }}
  type: ExternalName
  externalName: {{ .Values.gatewayApi.authExternalName | quote }}
  {{- end }}
  ports:
    - name: http
      port: {{ .Values.gatewayApi.authExternalPort }}
      targetPort: {{ .Values.gatewayApi.authExternalPort }}
---
{{- end }}
{{- if .Values.gatewayApi.authExternalAddress }}
apiVersion: v1
kind: Endpoints
metadata:
  name: {{ include "repody.fullname" . }}-auth-external
  labels:
    {{- include "repody.labels" . | nindent 4 }}
subsets:
  - addresses:
      - ip: {{ .Values.gatewayApi.authExternalAddress | quote }}
    ports:
      - name: http
        port: {{ .Values.gatewayApi.authExternalPort }}
        protocol: TCP
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "repody.fullname" . }}
  labels:
    {{- include "repody.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gatewayApi.gatewayClassName | quote }}
  {{- if .Values.gatewayApi.envoyProxyName }}
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: {{ .Values.gatewayApi.envoyProxyName | quote }}
  {{- end }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: {{ .Values.gatewayApi.allowedRoutes.from | default "Same" | quote }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "repody.fullname" . }}-web
  labels:
    {{- include "repody.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "repody.fullname" . }}
  hostnames:
    - {{ .Values.gatewayApi.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "repody.fullname" . }}-web
          port: 3000
---
{{- if .Values.gatewayApi.apiHost }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "repody.fullname" . }}-api
  labels:
    {{- include "repody.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "repody.fullname" . }}
  hostnames:
    - {{ .Values.gatewayApi.apiHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "repody.fullname" . }}-api
          port: 8000
---
{{- end }}
{{- if .Values.gatewayApi.filesHost }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "repody.fullname" . }}-files
  labels:
    {{- include "repody.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "repody.fullname" . }}
  hostnames:
    - {{ .Values.gatewayApi.filesHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Release.Name }}-minio
          port: 9000
---
{{- end }}
{{- if and .Values.gatewayApi.authHost (or .Values.gatewayApi.authServiceName .Values.gatewayApi.authExternalName .Values.gatewayApi.authExternalAddress) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "repody.fullname" . }}-auth
  labels:
    {{- include "repody.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ include "repody.fullname" . }}
  hostnames:
    - {{ .Values.gatewayApi.authHost | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          {{- if .Values.gatewayApi.authServiceName }}
          name: {{ .Values.gatewayApi.authServiceName | quote }}
          port: {{ .Values.gatewayApi.authServicePort }}
          {{- else }}
          name: {{ include "repody.fullname" . }}-auth-external
          port: {{ .Values.gatewayApi.authExternalPort }}
          {{- end }}
{{- end }}
{{- end }}
