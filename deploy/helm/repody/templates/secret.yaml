{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "repody.secretName" . }}
  labels:
    {{- include "repody.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_SECRET: {{ required "secrets.authSecret is required" .Values.secrets.authSecret | quote }}
  AUTH_KEYCLOAK_CLIENT_SECRET: {{ required "secrets.keycloakClientSecret is required" .Values.secrets.keycloakClientSecret | quote }}
  {{- if .Values.hatchet.enabled }}
  HATCHET_POSTGRES_PASSWORD: {{ required "hatchet.postgresPassword is required when hatchet.enabled" .Values.hatchet.postgresPassword | quote }}
  {{- end }}
{{- end }}
