apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "repody.fullname" . }}-config
  labels:
    {{- include "repody.labels" . | nindent 4 }}
data:
  AUDIT_DEPLOYMENT_ENVIRONMENT: {{ .Values.global.deploymentEnvironment | quote }}
  AUDIT_OIDC_ENABLED: {{ .Values.config.oidcEnabled | quote }}
  AUDIT_OIDC_ISSUER: {{ required "config.oidcIssuer is required when oidcEnabled" .Values.config.oidcIssuer | quote }}
  {{- if .Values.config.oidcIssuerAliases }}
  AUDIT_OIDC_ISSUER_ALIASES: {{ join "," .Values.config.oidcIssuerAliases | quote }}
  {{- end }}
  AUDIT_OIDC_AUDIENCE: {{ required "config.oidcAudience is required when oidcEnabled" .Values.config.oidcAudience | quote }}
  AUDIT_LOG_JSON: {{ .Values.config.logJson | quote }}
  {{- if and .Values.observability.otelEnabled (not .Values.observability.otelEndpoint) }}
  {{- fail "observability.otelEndpoint is required when observability.otelEnabled=true" }}
  {{- end }}
  AUDIT_OTEL_ENABLED: {{ .Values.observability.otelEnabled | quote }}
  {{- if .Values.observability.otelEnabled }}
  AUDIT_OTEL_EXPORTER_ENDPOINT: {{ .Values.observability.otelEndpoint | quote }}
  {{- end }}
  AUDIT_DIRECT_UPLOAD_ENABLED: {{ .Values.config.directUploadEnabled | quote }}
  AUDIT_STORAGE_BACKEND: s3
  AUDIT_INFERENCE_MODE: {{ .Values.config.inferenceMode | quote }}
  AUDIT_EXTRACTOR: {{ .Values.config.extractor | quote }}
  AUDIT_VLLM_BASE_URL: {{ .Values.config.vllmBaseUrl | quote }}
  AUDIT_VLLM_SERVED_MODEL: {{ .Values.config.vllmServedModel | quote }}
  AUDIT_DOCKER_MODEL_RUNNER_BASE_URL: {{ .Values.config.dockerModelRunnerBaseUrl | quote }}
  AUDIT_DEFAULT_DOCUMENT_MODEL_ID: {{ .Values.config.defaultDocumentModelId | quote }}
  AUDIT_REPODY_VLM_ENABLED: {{ .Values.config.repodyVlmEnabled | quote }}
  AUDIT_REPODY_VLM_MODEL: {{ .Values.config.repodyVlmModel | quote }}
  AUDIT_REPODY_VLM_MAX_TOKENS: {{ .Values.config.repodyVlmMaxTokens | quote }}
  {{- if .Values.config.repodyVlmMaxEdgePx }}
  AUDIT_REPODY_VLM_MAX_EDGE_PX: {{ .Values.config.repodyVlmMaxEdgePx | quote }}
  {{- end }}
  AUDIT_REPODY_VLM_PDF_DPI: {{ .Values.config.repodyVlmPdfDpi | quote }}
  AUDIT_REPODY_VLM_MAX_PAGES_PER_REQUEST: {{ .Values.config.repodyVlmMaxPagesPerRequest | quote }}
  AUDIT_REPODY_VLM_MARKDOWN_MAX_TOKENS: {{ .Values.config.repodyVlmMarkdownMaxTokens | quote }}
  AUDIT_REPODY_VLM_ENABLE_THINKING: {{ .Values.config.repodyVlmEnableThinking | quote }}
  AUDIT_REPODY_VLM_JPEG_QUALITY: {{ .Values.config.repodyVlmJpegQuality | quote }}
  AUDIT_REPODY_VLM_TIMEOUT_SECONDS: {{ .Values.config.repodyVlmTimeoutSeconds | quote }}
  AUDIT_WORKER_TASK_TIMEOUT_MINUTES: {{ .Values.config.workerTaskTimeoutMinutes | quote }}
  AUDIT_STALE_RUN_TIMEOUT_MINUTES: {{ .Values.config.staleRunTimeoutMinutes | quote }}
  AUDIT_QUEUED_STALE_TIMEOUT_MINUTES: {{ .Values.config.queuedStaleTimeoutMinutes | quote }}
  AUDIT_MAINTENANCE_INTERVAL_SECONDS: {{ .Values.config.maintenanceIntervalSeconds | quote }}
  AUDIT_DB_POOL_SIZE: {{ .Values.config.dbPoolSize | quote }}
  AUDIT_DB_MAX_OVERFLOW: {{ .Values.config.dbMaxOverflow | quote }}
  AUDIT_REDIS_MAX_CONNECTIONS: {{ .Values.config.redisMaxConnections | quote }}
  AUDIT_OCR_MAX_PAGES: {{ .Values.config.ocrMaxPages | quote }}
  AUDIT_CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  AUDIT_RUN_MIGRATIONS_ON_STARTUP: {{ ternary "false" "true" .Values.migrations.enabled | quote }}
  AUDIT_SEED_ON_STARTUP: "false"
  AUDIT_RATE_LIMIT_FAIL_CLOSED: {{ .Values.config.rateLimitFailClosed | quote }}
  AUDIT_RATE_LIMIT_ENABLED: {{ .Values.config.rateLimitEnabled | quote }}
  AUDIT_RATE_LIMIT_WINDOW_SECONDS: {{ .Values.config.rateLimitWindowSeconds | quote }}
  AUDIT_RATE_LIMIT_RUNS_PER_WORKFLOW: {{ .Values.config.rateLimitRunsPerWorkflow | quote }}
  AUDIT_RATE_LIMIT_RUNS_PER_CLIENT: {{ .Values.config.rateLimitRunsPerClient | quote }}
  AUDIT_ADMISSION_CONTROL_ENABLED: {{ .Values.config.admissionControlEnabled | quote }}
  AUDIT_ADMISSION_MAX_QUEUED: {{ .Values.config.admissionMaxQueued | quote }}
  AUDIT_ADMISSION_MAX_INFLIGHT: {{ .Values.config.admissionMaxInflight | quote }}
  AUDIT_ADMISSION_MAX_EXTRACT_INFLIGHT: {{ .Values.config.admissionMaxExtractInflight | quote }}
  AUDIT_ADMISSION_RETRY_AFTER_SECONDS: {{ .Values.config.admissionRetryAfterSeconds | quote }}
  AUDIT_OPERATOR_ACTIONS_ENABLED: {{ .Values.config.operatorActionsEnabled | quote }}
  {{- if .Values.config.operatorBenchmarkUser }}
  AUDIT_OPERATOR_BENCHMARK_USER: {{ .Values.config.operatorBenchmarkUser | quote }}
  {{- end }}
  {{- if .Values.config.operatorBenchmarkPassword }}
  AUDIT_OPERATOR_BENCHMARK_PASSWORD: {{ .Values.config.operatorBenchmarkPassword | quote }}
  {{- end }}
  {{- if .Values.config.keycloakClientId }}
  AUDIT_KEYCLOAK_CLIENT_ID: {{ .Values.config.keycloakClientId | quote }}
  {{- end }}
  AUDIT_REPODY_VLM_MARKDOWN_ON_EXTRACT: {{ .Values.config.repodyVlmMarkdownOnExtract | quote }}
  AUDIT_GPU_LIVE_PROBE: {{ .Values.config.gpuLiveProbe | quote }}
  AUDIT_HEALTHZ_PROBE_INFERENCE: {{ .Values.config.healthzProbeInference | quote }}
  {{- if ne (toString .Values.config.parallelDocExtraction) "" }}
  AUDIT_PARALLEL_DOC_EXTRACTION: {{ .Values.config.parallelDocExtraction | quote }}
  {{- end }}
  AUDIT_PARALLEL_STORAGE_FETCH: {{ .Values.config.parallelStorageFetch | quote }}
  {{- if .Values.externalObjectStorage.publicEndpoint }}
  AUDIT_MINIO_PUBLIC_ENDPOINT: {{ .Values.externalObjectStorage.publicEndpoint | quote }}
  {{- else if .Values.ingress.enabled }}
  AUDIT_MINIO_PUBLIC_ENDPOINT: {{ .Values.ingress.filesHost | quote }}
  {{- else if and .Values.gatewayApi.enabled .Values.gatewayApi.filesHost }}
  AUDIT_MINIO_PUBLIC_ENDPOINT: {{ .Values.gatewayApi.filesHost | quote }}
  {{- end }}
