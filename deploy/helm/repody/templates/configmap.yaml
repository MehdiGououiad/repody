apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "repody.fullname" . }}-config
  labels:
    {{- include "repody.labels" . | nindent 4 }}
data:
  AUDIT_DEPLOYMENT_ENVIRONMENT: {{ .Values.global.deploymentEnvironment | quote }}
  AUDIT_AUTH_ENABLED: {{ .Values.config.authEnabled | quote }}
  AUDIT_LOG_JSON: {{ .Values.config.logJson | quote }}
  AUDIT_DIRECT_UPLOAD_ENABLED: {{ .Values.config.directUploadEnabled | quote }}
  AUDIT_STORAGE_BACKEND: s3
  AUDIT_INFERENCE_MODE: {{ .Values.config.inferenceMode | quote }}
  AUDIT_VLLM_BASE_URL: {{ .Values.config.vllmBaseUrl | quote }}
  AUDIT_VLLM_SERVED_MODEL: {{ .Values.config.vllmServedModel | quote }}
  AUDIT_CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  AUDIT_RUN_MIGRATIONS_ON_STARTUP: "true"
  AUDIT_SEED_ON_STARTUP: "false"
  AUDIT_USE_CREATE_ALL: "false"
  HATCHET_CLIENT_TLS_STRATEGY: none
  {{- if .Values.hatchet.enabled }}
  HATCHET_CLIENT_HOST_PORT: {{ include "repody.fullname" . }}-hatchet:7077
  HATCHET_CLIENT_SERVER_URL: http://{{ include "repody.fullname" . }}-hatchet:8888
  {{- end }}
  {{- if .Values.externalObjectStorage.publicEndpoint }}
  AUDIT_MINIO_PUBLIC_ENDPOINT: {{ .Values.externalObjectStorage.publicEndpoint | quote }}
  {{- else if .Values.ingress.enabled }}
  AUDIT_MINIO_PUBLIC_ENDPOINT: {{ .Values.ingress.filesHost | quote }}
  {{- end }}
