{{- if .Values.ingress.enabled }}
{{- $apiHost := .Values.ingress.apiHost | default "" }}
{{- $filesHost := .Values.ingress.filesHost | default "" }}
{{- $filesSvc := "" }}
{{- $filesPort := .Values.ingress.filesServicePort | default 9000 }}
{{- if .Values.minio.enabled }}
{{- $filesSvc = printf "%s-minio" .Release.Name }}
{{- else if .Values.ingress.filesServiceName }}
{{- $filesSvc = .Values.ingress.filesServiceName }}
{{- else if eq (.Values.global.deploymentProfile | default "external") "bundled" }}
{{- $filesSvc = "repody-data-minio" }}
{{- end }}
{{- $exposeFiles := and $filesHost $filesSvc }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "repody.fullname" . }}-ingress
  labels:
    {{- include "repody.labels" . | nindent 4 }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- range $key, $value := .Values.ingress.controllerAnnotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ required "ingress.host is required when ingress.tls.enabled" .Values.ingress.host | quote }}
        {{- if $apiHost }}
        - {{ $apiHost | quote }}
        {{- end }}
        {{- if $exposeFiles }}
        - {{ $filesHost | quote }}
        {{- end }}
      secretName: {{ required "ingress.tls.secretName is required when ingress.tls.enabled" .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ required "ingress.host is required when ingress.enabled" .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "repody.fullname" . }}-web
                port:
                  number: 3000
    {{- if $apiHost }}
    - host: {{ $apiHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "repody.fullname" . }}-api
                port:
                  number: 8000
    {{- end }}
    {{- if $exposeFiles }}
    - host: {{ $filesHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $filesSvc | quote }}
                port:
                  number: {{ $filesPort }}
    {{- end }}
{{- end }}
