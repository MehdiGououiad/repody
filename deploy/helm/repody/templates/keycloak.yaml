{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "repody.fullname" . }}-keycloak-realm
  labels:
    {{- include "repody.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
data:
  realm-repody.json: |
{{ .Files.Get "files/realm-repody.json" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "repody.fullname" . }}-keycloak
  labels:
    {{- include "repody.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "repody.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: auth
  template:
    metadata:
      labels:
        {{- include "repody.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: auth
    spec:
      {{- include "repody.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image | quote }}
          args:
            - start-dev
            - --import-realm
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUsername | quote }}
            {{- if .Values.keycloak.existingSecret }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.existingSecret }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            {{- else }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: {{ required "keycloak.adminPassword when keycloak.enabled and no existingSecret" .Values.keycloak.adminPassword | quote }}
            {{- end }}
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HOSTNAME
              value: {{ .Values.keycloak.hostname | quote }}
            - name: KC_HOSTNAME_STRICT
              value: {{ .Values.keycloak.hostnameStrict | quote }}
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: {{ .Values.keycloak.hostnameStrictHttps | quote }}
            {{- if .Values.keycloak.proxyHeaders }}
            - name: KC_PROXY_HEADERS
              value: {{ .Values.keycloak.proxyHeaders | quote }}
            {{- end }}
            - name: KC_HEALTH_ENABLED
              value: "true"
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          readinessProbe:
            httpGet:
              path: /realms/{{ .Values.keycloak.realm }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
      volumes:
        - name: realm-import
          configMap:
            name: {{ include "repody.fullname" . }}-keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    {{- include "repody.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
spec:
  type: ClusterIP
  selector:
    {{- include "repody.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: auth
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
