{{- /*
Enterprise guardrails — profile-aware. Fails fast when production values drift unsafe.
*/ -}}
{{- $profile := .Values.global.deploymentProfile | default "external" -}}
{{- if eq .Values.global.deploymentEnvironment "production" -}}

  {{- /* ── Both profiles: no inline app secrets, immutable tags ── */ -}}
  {{- if .Values.secrets.create -}}
    {{- fail "production must not create inline chart secrets; use External Secrets, Vault, SOPS, or client secret manager" -}}
  {{- end -}}
  {{- if not .Values.secrets.existingSecret -}}
    {{- fail "production requires secrets.existingSecret (repody-runtime-secrets via ESO/Vault)" -}}
  {{- end -}}
  {{- range $name, $image := .Values.images -}}
    {{- if or (eq (toString $image.tag) "latest") (eq (toString $image.tag) "") -}}
      {{- fail (printf "production image %s must use an immutable tag or digest, not latest/empty" $name) -}}
    {{- end -}}
  {{- end -}}

  {{- /* ── App chart never bundles stateful subcharts in production ── */ -}}
  {{- if .Values.postgresql.enabled -}}
    {{- fail "enable Postgres via repody-data chart (bundled profile) or externalDatabase (external profile)" -}}
  {{- end -}}
  {{- if .Values.redis.enabled -}}
    {{- fail "enable Redis via repody-data chart (bundled profile) or externalRedis (external profile)" -}}
  {{- end -}}
  {{- if .Values.minio.enabled -}}
    {{- fail "enable MinIO via repody-data chart (bundled profile) or externalObjectStorage (external profile)" -}}
  {{- end -}}
  {{- if .Values.keycloak.enabled -}}
    {{- fail "use external IdP (OIDC) or repody-auth chart; do not enable keycloak in the app chart" -}}
  {{- end -}}

  {{- if eq $profile "external" -}}
    {{- if not .Values.externalDatabase.enabled -}}
      {{- fail "external profile requires externalDatabase.enabled=true" -}}
    {{- end -}}
    {{- if not .Values.externalRedis.enabled -}}
      {{- fail "external profile requires externalRedis.enabled=true" -}}
    {{- end -}}
    {{- if not .Values.externalObjectStorage.enabled -}}
      {{- fail "external profile requires externalObjectStorage.enabled=true" -}}
    {{- end -}}
    {{- if not .Values.externalDatabase.existingSecret -}}
      {{- fail "external profile requires externalDatabase.existingSecret" -}}
    {{- end -}}
    {{- if not .Values.externalRedis.existingSecret -}}
      {{- fail "external profile requires externalRedis.existingSecret" -}}
    {{- end -}}
    {{- if not .Values.externalObjectStorage.existingSecret -}}
      {{- fail "external profile requires externalObjectStorage.existingSecret" -}}
    {{- end -}}
    {{- if or .Values.externalObjectStorage.accessKey .Values.externalObjectStorage.secretKey -}}
      {{- fail "external profile must not set object-storage keys inline; use existingSecret" -}}
    {{- end -}}
  {{- else if eq $profile "bundled" -}}
  {{- else -}}
    {{- fail (printf "unsupported global.deploymentProfile %q (use external or bundled)" $profile) -}}
  {{- end -}}

  {{- /* bundled: connection strings still come from repody-runtime-secrets, not Helm values */ -}}
  {{- if eq $profile "bundled" -}}
    {{- if not .Values.externalDatabase.existingSecret -}}
      {{- fail "bundled profile requires externalDatabase.existingSecret (AUDIT_DATABASE_URL in Vault/ESO)" -}}
    {{- end -}}
    {{- if not .Values.externalRedis.existingSecret -}}
      {{- fail "bundled profile requires externalRedis.existingSecret (AUDIT_REDIS_URL in Vault/ESO)" -}}
    {{- end -}}
    {{- if not .Values.externalObjectStorage.existingSecret -}}
      {{- fail "bundled profile requires externalObjectStorage.existingSecret" -}}
    {{- end -}}
    {{- if or .Values.externalObjectStorage.accessKey .Values.externalObjectStorage.secretKey -}}
      {{- fail "bundled profile must not set object-storage keys inline; use existingSecret" -}}
    {{- end -}}
    {{- if or .Values.externalDatabase.url .Values.externalRedis.url -}}
      {{- fail "bundled profile must not put database/redis URLs inline; use urlKey + existingSecret" -}}
    {{- end -}}
  {{- end -}}

{{- end -}}
