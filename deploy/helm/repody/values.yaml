# Enterprise default: Repody owns stateless app workloads only.
# Stateful systems, auth, secrets, observability, and inference are external/platform services.
# Local kind/dev values explicitly opt into bundled dependencies.

global:
  imagePullSecrets: []
  deploymentEnvironment: production

images:
  backend:
    repository: repody-backend
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  api:
    repository: repody-backend
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  worker:
    repository: repody-backend
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  web:
    repository: repody-web
    tag: "0.1.0"
    pullPolicy: IfNotPresent

# ── Bundled data plane (local/dev only; disabled for enterprise) ──────────────
postgresql:
  enabled: false
  auth:
    username: audit
    database: audit_workbench
    existingSecret: ""
    password: ""
  primary:
    persistence:
      enabled: true
      size: 20Gi

redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  image:
    repository: bitnamilegacy/redis
    tag: 8.2.1-debian-12-r0

minio:
  enabled: false
  mode: standalone
  image:
    repository: bitnamilegacy/minio
    tag: 2025.7.23-debian-12-r3
  console:
    image:
      repository: bitnamilegacy/minio-object-browser
      tag: 2.0.2-debian-12-r3
  auth:
    rootUser: minioadmin
    rootPassword: ""
  defaultBuckets: audit-documents
  persistence:
    enabled: true
    size: 50Gi

# ── External data plane (disable subcharts above, set URLs) ───────────────────
externalDatabase:
  enabled: true
  url: ""
  existingSecret: repody-runtime-secrets
  urlKey: AUDIT_DATABASE_URL

externalRedis:
  enabled: true
  url: ""
  existingSecret: repody-runtime-secrets
  urlKey: AUDIT_REDIS_URL

externalObjectStorage:
  enabled: true
  endpoint: ""
  bucket: audit-documents
  accessKey: ""
  secretKey: ""
  existingSecret: repody-runtime-secrets
  accessKeyKey: AUDIT_MINIO_ACCESS_KEY
  secretKeyKey: AUDIT_MINIO_SECRET_KEY
  secure: true
  publicEndpoint: ""

# ── Hatchet (bundled hatchet-stack for local/dev; externalHatchet for production) ─
hatchet:
  enabled: false
  waitInitImage: busybox:1.37.0
  # Optional override when not using hatchet-stack workerTokenJob (GitOps / air-gap).
  clientToken: ""
  clientTokenSecret: hatchet-client-config
  clientTokenKey: HATCHET_CLIENT_TOKEN

# Official hatchet-stack subchart — https://docs.hatchet.run/self-hosting/kubernetes-quickstart
# Bundled Postgres + RabbitMQ (postgres.enabled / rabbitmq.enabled). Production uses externalHatchet.
# In-cluster ClusterIP only (ingress disabled; no nginx). Repody workers reach engine via sharedConfig URLs.
# fullnameOverride on api/engine/frontend avoids a service-name clash with repody-api in this umbrella release.
hatchet-stack:
  caddy:
    enabled: false
  api:
    fullnameOverride: repody-hatchet-api
    replicaCount: 1
    ingress:
      enabled: false
    quickstartJob:
      enabled: true
    workerTokenJob:
      enabled: true
  engine:
    fullnameOverride: repody-hatchet-engine
    replicaCount: 1
    ingress:
      enabled: false
  frontend:
    fullnameOverride: repody-hatchet-frontend
    ingress:
      enabled: false
  postgres:
    enabled: true
    primary:
      extendedConfiguration: |
        timezone = 'UTC'
  rabbitmq:
    enabled: true

externalHatchet:
  enabled: true
  existingSecret: repody-runtime-secrets
  tokenKey: HATCHET_CLIENT_TOKEN
  hostPort: hatchet-grpc.example.com:443
  serverUrl: https://hatchet.example.com
  tlsStrategy: tls

migrations:
  enabled: false
  hookDeletePolicy: before-hook-creation,hook-succeeded
  backoffLimit: 3

# Skaffold / local hot-reload (uvicorn --reload when files are synced into the pod)
dev:
  apiReload: false

# ── Control plane (api) ───────────────────────────────────────────────────────
api:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

# ── Worker plane (scale here first) ───────────────────────────────────────────
workerOcr:
  replicas: 2
  pool: ocr
  maxJobs: 1
  warmupOnStart: false
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75
  terminationGracePeriodSeconds: 120
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

workerFast:
  replicas: 2
  pool: fast
  maxJobs: 8
  warmupOnStart: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  terminationGracePeriodSeconds: 60
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

# ── Edge (web) ────────────────────────────────────────────────────────────────
web:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

# ── In-cluster Keycloak (staging/local; production usually uses external IdP) ─
keycloak:
  enabled: false
  image: quay.io/keycloak/keycloak:26.6.3
  realm: repody
  hostname: auth.example.com
  # Busybox image for web pod init that maps gatewayApi.authHost → in-cluster Keycloak.
  authHostAliasInitImage: ""
  hostnameStrict: false
  hostnameStrictHttps: false
  proxyHeaders: xforwarded
  adminUsername: admin
  adminPassword: ""
  existingSecret: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

ingress:
  enabled: true
  className: nginx
  host: app.example.com
  filesHost: files.example.com
  tls:
    enabled: true
    secretName: repody-tls

gatewayApi:
  enabled: false
  createGatewayClass: false
  gatewayClassName: envoy-gateway
  gatewayClassControllerName: gateway.envoyproxy.io/gatewayclass-controller
  host: app.example.com
  apiHost: api.example.com
  filesHost: files.example.com
  authHost: auth.example.com
  authExternalName: ""
  authExternalAddress: ""
  authExternalPort: 8080
  # In-cluster Keycloak (or any Service in the release namespace).
  authServiceName: ""
  authServicePort: 8080
  # Optional EnvoyProxy (gateway.envoyproxy.io) for kind NodePort / custom service shape.
  envoyProxyName: ""
  kindNodePort: 0
  # Optional static ClusterIP for web pods to resolve authHost (external IdP or legacy).
  # When keycloak.enabled, the web Deployment init container sets this automatically.
  authHostAliasIp: ""
  allowedRoutes:
    from: Same
  tls:
    enabled: false
    secretName: repody-tls
    redirectHttp: true

# ── Platform secrets & config ─────────────────────────────────────────────────
secrets:
  authSecret: ""
  keycloakClientSecret: ""
  vllmApiKey: ""
  create: false
  existingSecret: repody-runtime-secrets

config:
  oidcEnabled: true
  authUrl: ""
  oidcIssuer: https://auth.example.com/realms/repody
  oidcJwksUrl: ""
  oidcAudience: repody-api
  keycloakClientId: repody-web
  inferenceMode: vllm
  # External OpenAI-compatible document-model endpoint. This chart does not run inference.
  vllmBaseUrl: https://vlm.example.com/v1
  vllmServedModel: numind/NuExtract3
  extractor: pipeline
  dockerModelRunnerBaseUrl: ""
  defaultOcrModel: repody:vlm
  repodyVlmEnabled: true
  repodyVlmModel: repody/repody-vlm:q4_k_m-16k
  repodyVlmMaxTokens: 512
  repodyVlmMaxEdgePx: ""
  repodyVlmPdfDpi: 170
  repodyVlmMaxPagesPerRequest: 4
  suryaOcrEnabled: true
  suryaInferenceBackend: llamacpp
  suryaInferenceUrl: ""
  suryaInferenceParallel: 8
  suryaImageDpi: 96
  suryaImageDpiHighres: 192
  suryaMaxTokensFullPage: 12288
  suryaDetectorTextThreshold: 0.6
  suryaLayoutBlockOcrEnabled: false
  suryaTableRecognitionEnabled: false
  repodyVlmMarkdownMaxTokens: 8192
  repodyVlmEnableThinking: false
  repodyVlmJpegQuality: 95
  repodyVlmTimeoutSeconds: 600
  ocrMaxPages: 4
  corsOrigins: '["https://app.example.com"]'
  logJson: true
  directUploadEnabled: true
  rateLimitFailClosed: true
  operatorActionsEnabled: false
  repodyVlmMarkdownOnExtract: true
  gpuLiveProbe: false

observability:
  bugsinkDsn: ""
  existingSecret: ""
  bugsinkDsnKey: BUGSINK_DSN
  # OTLP HTTP traces (/v1/traces). Logs stay JSON on stdout; trace_id is correlated in structlog.
  otelEnabled: false
  otelEndpoint: ""

networkPolicy:
  enabled: true
  externalEgress:
    enabled: true
    cidrs:
      - 0.0.0.0/0
    ports:
      - 80
      - 443
      - 5432
      - 6379
      - 6380
      - 9000
