# Enterprise default: Repody owns stateless app workloads only.
# Stateful systems, auth, secrets, observability, and inference are external/platform services.
# Bundled data plane: use deploy/client/values-bundled.example.yaml (OpenShift or generic K8s).

global:
  imagePullSecrets: []
  deploymentEnvironment: production
  openshift:
    enabled: false
    routes:
      enabled: false
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
      webHost: ""
      apiHost: ""
      filesHost: ""
      filesServiceName: repody-data-minio
      filesServicePort: 9000

# Portable hardening (Kubernetes Pod Security "restricted").
# Same profile on every platform. Local dev sets restricted: false.
platform:
  compatibility:
    restricted: true

images:
  backend:
    repository: repody-backend
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  api:
    repository: repody-backend
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  worker:
    repository: repody-backend
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  web:
    repository: repody-web
    tag: "0.1.0"
    pullPolicy: IfNotPresent

# ── Bundled data plane (local/dev only; disabled for enterprise) ──────────────
postgresql:
  enabled: false
  auth:
    username: audit
    database: audit_workbench
    existingSecret: ""
    password: ""
  primary:
    persistence:
      enabled: true
      size: 20Gi

redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  image:
    repository: bitnamilegacy/redis
    tag: 8.2.1-debian-12-r0

minio:
  enabled: false
  mode: standalone
  image:
    repository: bitnamilegacy/minio
    tag: 2025.7.23-debian-12-r3
  console:
    image:
      repository: bitnamilegacy/minio-object-browser
      tag: 2.0.2-debian-12-r3
  auth:
    rootUser: minioadmin
    rootPassword: ""
  defaultBuckets: audit-documents
  persistence:
    enabled: true
    size: 50Gi

# ── External data plane (disable subcharts above, set URLs) ───────────────────
externalDatabase:
  enabled: true
  url: ""
  host: ""
  port: 5432
  existingSecret: repody-runtime-secrets
  urlKey: AUDIT_DATABASE_URL

externalRedis:
  enabled: true
  url: ""
  existingSecret: repody-runtime-secrets
  urlKey: AUDIT_REDIS_URL

externalObjectStorage:
  enabled: true
  endpoint: ""
  bucket: audit-documents
  accessKey: ""
  secretKey: ""
  existingSecret: repody-runtime-secrets
  accessKeyKey: AUDIT_MINIO_ACCESS_KEY
  secretKeyKey: AUDIT_MINIO_SECRET_KEY
  secure: true
  publicEndpoint: ""

init:
  waitImage: busybox:1.37.0

migrations:
  enabled: false
  hookDeletePolicy: before-hook-creation,hook-succeeded
  backoffLimit: 3

# Skaffold / local hot-reload (uvicorn --reload when files are synced into the pod)
dev:
  apiReload: false

# ── Control plane (api) ───────────────────────────────────────────────────────
api:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

# ── Worker plane (scale here first) ───────────────────────────────────────────
workerOcr:
  replicas: 2
  pool: ocr
  maxJobs: 1
  warmupOnStart: false
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75
  terminationGracePeriodSeconds: 120
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

workerFast:
  replicas: 2
  pool: fast
  maxJobs: 8
  warmupOnStart: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  terminationGracePeriodSeconds: 60
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

# ── Edge (web) ────────────────────────────────────────────────────────────────
web:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway

# ── In-cluster Keycloak (staging/local; production usually uses external IdP) ─
keycloak:
  enabled: false
  image: quay.io/keycloak/keycloak:26.6.3
  realm: repody
  hostname: auth.example.com
  # Busybox image for web pod init that maps gatewayApi.authHost → in-cluster Keycloak.
  authHostAliasInitImage: ""
  hostnameStrict: false
  hostnameStrictHttps: false
  proxyHeaders: xforwarded
  adminUsername: admin
  adminPassword: ""
  existingSecret: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

ingress:
  enabled: true
  className: ""
  host: app.example.com
  apiHost: api.example.com
  filesHost: files.example.com
  filesServiceName: ""
  filesServicePort: 9000
  annotations: {}
  controllerAnnotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  tls:
    enabled: true
    secretName: repody-tls

gatewayApi:
  enabled: false
  createGatewayClass: false
  gatewayClassName: envoy-gateway
  gatewayClassControllerName: gateway.envoyproxy.io/gatewayclass-controller
  host: app.example.com
  apiHost: api.example.com
  filesHost: files.example.com
  authHost: auth.example.com
  authExternalName: ""
  authExternalAddress: ""
  authExternalPort: 8080
  # In-cluster Keycloak or external IdP Service (may be in another namespace).
  authServiceName: ""
  authServiceNamespace: ""
  authServicePort: 8080
  filesServiceName: ""
  filesServiceNamespace: ""
  filesServicePort: 9000
  authHostAliasInitImage: ""
  # Dev-only: root init rewrites /etc/hosts for authHost (breaks restricted profile). Use
  # authHostAliasIp or an external IdP URL in production instead.
  authHostAliasInitEnabled: false
  # Optional EnvoyProxy (gateway.envoyproxy.io) for custom Gateway service shape.
  envoyProxyName: ""
  kindNodePort: 0
  # Optional static ClusterIP for web pods to resolve authHost (external IdP or legacy).
  # When keycloak.enabled, the web Deployment init container sets this automatically.
  authHostAliasIp: ""
  allowedRoutes:
    from: Same
  tls:
    enabled: false
    secretName: repody-tls
    redirectHttp: true

# ── Platform secrets & config ─────────────────────────────────────────────────
secrets:
  authSecret: ""
  keycloakClientSecret: ""
  vllmApiKey: ""
  create: false
  existingSecret: repody-runtime-secrets

config:
  oidcEnabled: true
  authUrl: ""
  oidcIssuer: https://auth.example.com/realms/repody
  oidcJwksUrl: ""
  keycloakAdminUrl: ""
  keycloakAdminUsername: admin
  keycloakAdminPassword: ""
  oidcAudience: repody-api
  keycloakClientId: repody-web
  inferenceMode: vllm
  # External OpenAI-compatible document-model endpoint. This chart does not run inference.
  vllmBaseUrl: https://vlm.example.com/v1
  vllmServedModel: numind/NuExtract3
  extractor: pipeline
  dockerModelRunnerBaseUrl: ""
  defaultOcrModel: repody:vlm
  repodyVlmEnabled: true
  repodyVlmModel: repody/repody-vlm:q4_k_m-16k
  repodyVlmMaxTokens: 512
  repodyVlmMaxEdgePx: ""
  repodyVlmPdfDpi: 170
  repodyVlmMaxPagesPerRequest: 4
  repodyVlmMarkdownMaxTokens: 8192
  repodyVlmEnableThinking: false
  repodyVlmJpegQuality: 95
  repodyVlmTimeoutSeconds: 600
  ocrMaxPages: 4
  corsOrigins: '["https://app.example.com"]'
  logJson: true
  directUploadEnabled: true
  rateLimitFailClosed: true
  admissionControlEnabled: true
  admissionMaxQueued: 50
  admissionMaxInflight: 64
  admissionMaxOcrInflight: 8
  admissionRetryAfterSeconds: 60
  operatorActionsEnabled: false
  repodyVlmMarkdownOnExtract: true
  gpuLiveProbe: false

observability:
  bugsinkDsn: ""
  existingSecret: ""
  bugsinkDsnKey: BUGSINK_DSN
  # OTLP HTTP traces (/v1/traces). Logs stay JSON on stdout; trace_id is correlated in structlog.
  otelEnabled: false
  otelEndpoint: ""

networkPolicy:
  enabled: true
  # OVN (OpenShift): port-only DNS egress is insufficient — allow these namespaces (all ports).
  dnsNamespaces:
    - openshift-dns
    - kube-system
  externalEgress:
    enabled: true
    cidrs:
      - 0.0.0.0/0
    ports:
      - 80
      - 443
      - 5432
      - 6379
      - 6380
      - 7070
      - 8081
      - 9000
