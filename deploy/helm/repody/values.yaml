# Default: in-cluster data plane + self-hosted Hatchet (per ADR 004).
# Override for managed RDS/S3: set postgresql.enabled=false and externalDatabase.*

global:
  imagePullSecrets: []
  deploymentEnvironment: production

images:
  api:
    repository: repody-api
    tag: latest
    pullPolicy: IfNotPresent
  worker:
    repository: repody-worker
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: repody-web
    tag: latest
    pullPolicy: IfNotPresent

# ── Bitnami data plane (in-cluster) ───────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: audit
    database: audit_workbench
    existingSecret: ""
    password: ""
  primary:
    persistence:
      enabled: true
      size: 20Gi

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  image:
    repository: bitnamilegacy/redis
    tag: 8.2.1-debian-12-r0

minio:
  enabled: true
  mode: standalone
  image:
    repository: bitnamilegacy/minio
    tag: 2025.7.23-debian-12-r3
  console:
    image:
      repository: bitnamilegacy/minio-object-browser
      tag: 2.0.2-debian-12-r3
  auth:
    rootUser: minioadmin
    rootPassword: ""
  defaultBuckets: audit-documents
  persistence:
    enabled: true
    size: 50Gi

# ── External data plane (disable subcharts above, set URLs) ───────────────────
externalDatabase:
  enabled: false
  url: ""

externalRedis:
  enabled: false
  url: ""

externalObjectStorage:
  enabled: false
  endpoint: ""
  bucket: audit-documents
  accessKey: ""
  secretKey: ""
  secure: true
  publicEndpoint: ""

# ── Hatchet (self-hosted, mirrors Compose hatchet-lite) ───────────────────────
hatchet:
  enabled: true
  image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
  adminImage: ghcr.io/hatchet-dev/hatchet/hatchet-admin:latest
  postgresImage: postgres:17.10-alpine
  waitInitImage: busybox:1.37.0
  kubectlImage: dtzar/helm-kubectl:3.18.6
  postgresPassword: hatchet
  # Set after first install, or leave empty and enable bootstrapToken job.
  clientToken: ""
  bootstrapToken: true

# ── Control plane (api) ───────────────────────────────────────────────────────
api:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── Worker plane (scale here first) ───────────────────────────────────────────
workerOcr:
  replicas: 2
  pool: ocr
  maxJobs: 1
  warmupOnStart: true
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 8Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75

workerFast:
  replicas: 2
  pool: fast
  maxJobs: 8
  warmupOnStart: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

# ── Edge (web) ────────────────────────────────────────────────────────────────
web:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# ── In-cluster Keycloak (staging/local; production usually uses external IdP) ─
keycloak:
  enabled: false
  image: quay.io/keycloak/keycloak:26.6.3
  realm: repody
  hostname: auth.example.com
  hostnameStrict: false
  hostnameStrictHttps: false
  proxyHeaders: xforwarded
  adminUsername: admin
  adminPassword: ""
  existingSecret: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

ingress:
  enabled: true
  className: nginx
  host: app.example.com
  filesHost: files.example.com
  tls:
    enabled: true
    secretName: repody-tls

gatewayApi:
  enabled: false
  createGatewayClass: false
  gatewayClassName: envoy-gateway
  gatewayClassControllerName: gateway.envoyproxy.io/gatewayclass-controller
  host: app.example.com
  apiHost: api.example.com
  filesHost: files.example.com
  authHost: auth.example.com
  authExternalName: ""
  authExternalAddress: ""
  authExternalPort: 8080
  # In-cluster Keycloak (or any Service in the release namespace).
  authServiceName: ""
  authServicePort: 8080
  # Optional EnvoyProxy (gateway.envoyproxy.io) for kind NodePort / custom service shape.
  envoyProxyName: ""
  kindNodePort: 0
  # Envoy Gateway ClusterIP — web pods resolve authHost through the gateway (local kind).
  authHostAliasIp: ""
  allowedRoutes:
    from: Same

# ── Platform secrets & config ─────────────────────────────────────────────────
secrets:
  authSecret: ""
  keycloakClientSecret: ""
  vllmApiKey: ""
  create: true
  existingSecret: ""

config:
  oidcEnabled: true
  authUrl: ""
  oidcIssuer: https://auth.example.com/realms/repody
  oidcJwksUrl: ""
  oidcAudience: repody-api
  keycloakClientId: repody-web
  inferenceMode: vllm
  vllmBaseUrl: http://vllm.inference.svc.cluster.local:8000/v1
  vllmServedModel: numind/NuExtract3
  extractor: pipeline
  dockerModelRunnerBaseUrl: http://model-runner.docker.internal/engines/llama.cpp/v1
  defaultOcrModel: repody:vlm
  repodyVlmEnabled: true
  repodyVlmModel: repody/repody-vlm:q4_k_m-16k
  repodyVlmMaxTokens: 512
  repodyVlmMaxEdgePx: 1024
  repodyVlmPdfDpi: 144
  repodyVlmMaxPagesPerRequest: 4
  ocrMaxPages: 4
  corsOrigins: '["https://app.example.com"]'
  logJson: true
  directUploadEnabled: true
  rateLimitFailClosed: true

observability:
  bugsinkDsn: ""
  otelEnabled: false
  otelEndpoint: ""
