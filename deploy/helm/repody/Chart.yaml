apiVersion: v2
name: repody
description: Repody audit platform — microservice deployments for Kubernetes
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - repody
  - audit
  - microservices
dependencies:
  - name: postgresql
    version: 18.7.6
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 27.0.10
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: minio
    version: 17.0.21
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
  - name: hatchet-stack
    alias: hatchet-stack
    version: 0.11.0
    repository: https://hatchet-dev.github.io/hatchet-charts
    condition: hatchet.enabled
