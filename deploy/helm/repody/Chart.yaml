apiVersion: v2
name: repody
description: Repody audit platform — microservice deployments for Kubernetes
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - repody
  - audit
  - microservices
dependencies:
  - name: postgresql
    version: 16.7.27
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: redis
    version: 21.2.12
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
  - name: minio
    version: 17.0.21
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: minio.enabled
