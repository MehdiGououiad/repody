global:
  imagePullSecrets: []
  deploymentEnvironment: production

postgresql:
  enabled: false
  auth:
    username: audit
    database: audit_workbench
    existingSecret: ""
    password: ""
  primary:
    persistence:
      enabled: true
      size: 20Gi

redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  image:
    repository: bitnamilegacy/redis
    tag: 8.2.1-debian-12-r0

minio:
  enabled: false
  mode: standalone
  image:
    repository: bitnamilegacy/minio
    tag: 2025.7.23-debian-12-r3
  console:
    image:
      repository: bitnamilegacy/minio-object-browser
      tag: 2.0.2-debian-12-r3
  auth:
    rootUser: minioadmin
    rootPassword: ""
  defaultBuckets: audit-documents
  persistence:
    enabled: true
    size: 50Gi

gatewayConsumerNamespace: repody
