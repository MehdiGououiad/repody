global:
  imagePullSecrets: []
  deploymentEnvironment: production

postgresql:
  enabled: false
  auth:
    username: audit
    database: audit_workbench
    existingSecret: ""
    password: ""
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0-debian-12-r4
  primary:
    persistence:
      enabled: true
      size: 20Gi

redis:
  enabled: false
  architecture: standalone
  auth:
    enabled: false
  image:
    repository: bitnamilegacy/redis
    tag: 8.4.0-debian-12-r1

minio:
  enabled: false
  mode: standalone
  image:
    repository: pgsty/minio
    tag: RELEASE.2026-06-18T00-00-00Z
  console:
    enabled: false
  auth:
    rootUser: minioadmin
    rootPassword: ""
  defaultBuckets: audit-documents
  persistence:
    enabled: true
    size: 50Gi

gatewayConsumerNamespace: repody
