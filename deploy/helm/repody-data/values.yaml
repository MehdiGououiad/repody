global:
  imagePullSecrets: []
  deploymentEnvironment: production

# Official Docker Library + pgsty MinIO fork (see deploy/pinned-images.env, compose.yaml).
postgresql:
  enabled: false
  image:
    registry: docker.io
    repository: postgres
    tag: "17.10-alpine"
  auth:
    username: audit
    database: audit_workbench
    existingSecret: ""
    secretKeys:
      passwordKey: password
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  resources: {}

redis:
  enabled: false
  image:
    registry: docker.io
    repository: redis
    tag: "8.8.0-alpine"
  auth:
    enabled: false
    existingSecret: ""
    passwordKey: redis-password
  persistence:
    enabled: true
    size: 4Gi
    storageClass: ""
  resources: {}

minio:
  enabled: false
  image:
    registry: docker.io
    repository: pgsty/minio
    tag: RELEASE.2026-06-18T00-00-00Z
  mcImage:
    registry: docker.io
    repository: pgsty/mc
    tag: RELEASE.2026-04-17T00-00-00Z
  auth:
    existingSecret: ""
    rootUserKey: rootUser
    rootPasswordKey: rootPassword
  defaultBuckets: audit-documents
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
  resources: {}

gatewayConsumerNamespace: repody
