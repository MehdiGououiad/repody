# Local kind — data plane in repody-data namespace.
global:
  deploymentEnvironment: local
  imageRegistry: harbor.repody.lvh.me:8080/repody
  security:
    allowInsecureImages: true

gatewayConsumerNamespace: repody-app

postgresql:
  enabled: true
  auth:
    password: audit-local-k8s

redis:
  enabled: true

minio:
  enabled: true
  ingress:
    enabled: false
    tls: []
  startupProbe:
    enabled: true
    periodSeconds: 5
    failureThreshold: 24
  auth:
    rootPassword: minio-local-k8s
