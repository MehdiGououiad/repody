apiVersion: v2
name: audit-platform
description: Repody audit platform — microservice deployments for Kubernetes
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - repody
  - audit
  - microservices
dependencies:
  - name: postgresql
    version: 15.5.38
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: redis
    version: 20.6.2
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
  - name: minio
    version: 14.8.5
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: minio.enabled
