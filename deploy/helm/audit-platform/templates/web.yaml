apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "audit-platform.fullname" . }}-web
  labels:
    {{- include "audit-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: edge
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "audit-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: edge
  template:
    metadata:
      labels:
        {{- include "audit-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: edge
    spec:
      containers:
        - name: web
          image: "{{ .Values.images.web.repository }}:{{ .Values.images.web.tag }}"
          imagePullPolicy: {{ .Values.images.web.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: BACKEND_URL
              value: http://{{ include "audit-platform.fullname" . }}-api:8000
            - name: INTERNAL_API_URL
              value: http://{{ include "audit-platform.fullname" . }}-api:8000
            - name: AUDIT_ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "audit-platform.fullname" . }}-secrets
                  key: AUDIT_ADMIN_API_TOKEN
            {{- if .Values.observability.sentryDsn }}
            - name: SENTRY_DSN
              value: {{ .Values.observability.sentryDsn | quote }}
            - name: NEXT_PUBLIC_SENTRY_DSN
              value: {{ .Values.observability.sentryDsn | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "audit-platform.fullname" . }}-web
  labels:
    {{- include "audit-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: edge
spec:
  type: ClusterIP
  selector:
    {{- include "audit-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: edge
  ports:
    - name: http
      port: 3000
      targetPort: http
