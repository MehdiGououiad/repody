{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "audit-platform.secretName" . }}
  labels:
    {{- include "audit-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUDIT_ADMIN_API_TOKEN: {{ required "secrets.adminApiToken is required" .Values.secrets.adminApiToken | quote }}
  {{- if .Values.hatchet.enabled }}
  HATCHET_POSTGRES_PASSWORD: {{ required "hatchet.postgresPassword is required when hatchet.enabled" .Values.hatchet.postgresPassword | quote }}
  {{- end }}
{{- end }}
