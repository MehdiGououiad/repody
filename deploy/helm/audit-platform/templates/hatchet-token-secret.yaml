{{- if and .Values.hatchet.enabled .Values.hatchet.clientToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "audit-platform.fullname" . }}-hatchet-token
  labels:
    {{- include "audit-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.hatchet.clientToken | quote }}
{{- end }}
