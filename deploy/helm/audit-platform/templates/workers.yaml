apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "audit-platform.fullname" . }}-worker-ocr
  labels:
    {{- include "audit-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-ocr
spec:
  replicas: {{ .Values.workerOcr.replicas }}
  selector:
    matchLabels:
      {{- include "audit-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker-ocr
  template:
    metadata:
      labels:
        {{- include "audit-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker-ocr
    spec:
      {{- if and .Values.hatchet.enabled (not .Values.hatchet.clientToken) .Values.hatchet.bootstrapToken }}
      initContainers:
        {{- include "audit-platform.waitHatchetTokenInit" . | nindent 8 }}
      volumes:
        - name: hatchet-client-token
          secret:
            secretName: {{ include "audit-platform.fullname" . }}-hatchet-token
            optional: true
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.images.worker.repository }}:{{ .Values.images.worker.tag }}"
          imagePullPolicy: {{ .Values.images.worker.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "audit-platform.fullname" . }}-config
          env:
            - name: AUDIT_RUN_MIGRATIONS_ON_STARTUP
              value: "false"
            - name: AUDIT_WORKER_POOL
              value: {{ .Values.workerOcr.pool | quote }}
            - name: AUDIT_WORKER_OCR_MAX_JOBS
              value: {{ .Values.workerOcr.maxJobs | quote }}
            - name: AUDIT_REPODY_VLM_WARMUP_ON_START
              value: {{ .Values.workerOcr.warmupOnStart | quote }}
            - name: AUDIT_OTEL_SERVICE_NAME
              value: audit-workbench-worker-ocr
            {{- include "audit-platform.dataPlaneEnv" . | nindent 12 }}
            {{- if .Values.observability.sentryDsn }}
            - name: SENTRY_DSN
              value: {{ .Values.observability.sentryDsn | quote }}
            - name: SENTRY_ENABLE_LOGS
              value: "false"
            {{- end }}
          resources:
            {{- toYaml .Values.workerOcr.resources | nindent 12 }}
---
