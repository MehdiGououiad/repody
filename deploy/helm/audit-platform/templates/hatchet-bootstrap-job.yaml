{{- if and .Values.hatchet.enabled .Values.hatchet.bootstrapToken (not .Values.hatchet.clientToken) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "audit-platform.fullname" . }}-hatchet-bootstrap
  labels:
    {{- include "audit-platform.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "audit-platform.fullname" . }}-hatchet-bootstrap
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "audit-platform.fullname" . }}-hatchet-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "audit-platform.fullname" . }}-hatchet-bootstrap
subjects:
  - kind: ServiceAccount
    name: {{ include "audit-platform.fullname" . }}-hatchet-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "audit-platform.fullname" . }}-hatchet-token-bootstrap
  labels:
    {{- include "audit-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: hatchet-bootstrap
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "audit-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hatchet-bootstrap
    spec:
      serviceAccountName: {{ include "audit-platform.fullname" . }}-hatchet-bootstrap
      restartPolicy: OnFailure
      initContainers:
        - name: wait-hatchet
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 90); do
                if wget -qO- http://{{ include "audit-platform.fullname" . }}-hatchet:8888/ 2>/dev/null; then
                  exit 0
                fi
                sleep 3
              done
              exit 1
        - name: create-token
          image: {{ .Values.hatchet.adminImage | quote }}
          env:
            - name: DATABASE_URL
              value: postgresql://hatchet:$(HATCHET_POSTGRES_PASSWORD)@{{ include "audit-platform.fullname" . }}-hatchet-postgres:5432/hatchet?sslmode=disable
            - name: HATCHET_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "audit-platform.secretName" . }}
                  key: HATCHET_POSTGRES_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -e
              for i in $(seq 1 30); do
                if /hatchet/hatchet-admin --config /config token create --name audit-workbench > /shared/token; then
                  exit 0
                fi
                sleep 3
              done
              exit 1
          volumeMounts:
            - name: hatchet-config
              mountPath: /config
            - name: shared
              mountPath: /shared
      containers:
        - name: store-secret
          image: bitnami/kubectl:1.30
          env:
            - name: TOKEN_SECRET
              value: {{ include "audit-platform.fullname" . }}-hatchet-token
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              TOKEN="$(tr -d '\n' < /shared/token)"
              kubectl create secret generic "$TOKEN_SECRET" \
                --from-literal=token="$TOKEN" \
                --dry-run=client -o yaml | kubectl apply -f -
              echo "Hatchet token secret applied"
          volumeMounts:
            - name: shared
              mountPath: /shared
              readOnly: true
      volumes:
        - name: hatchet-config
          persistentVolumeClaim:
            claimName: {{ include "audit-platform.fullname" . }}-hatchet-config
        - name: shared
          emptyDir: {}
{{- end }}
