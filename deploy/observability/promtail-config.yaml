# Local dev — ship Docker container logs + host-run API log file to Loki.
# Requires Docker socket mount (Docker Desktop on Windows/macOS/Linux).
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            trace_id: trace_id
            level: level
            service_name: '"service.name"'
            event: event
      - labels:
          level:
          service_name:

  - job_name: repody-host-api
    static_configs:
      - targets: [localhost]
        labels:
          job: repody-api
          compose_service: repody-api
          __path__: /var/log/repody/repody-api.log
    pipeline_stages:
      - json:
          expressions:
            trace_id: trace_id
            level: level
            service_name: '"service.name"'
            event: event
      - labels:
          level:
          service_name:
