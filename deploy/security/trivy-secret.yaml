# Reduce noise from test fixtures and example env files (path = regex).
allow-rules:
  - id: skip-e2e-fixtures
    path: e2e/fixtures/.*
  - id: skip-generated-openapi
    path: lib/api/openapi\.json
  - id: skip-env-examples
    path: deploy/env/.*
  - id: skip-env-example-root
    path: \.env\.example
  - id: skip-local-env
    path: backend/\.env
  - id: skip-auth-env
    path: \.env\.local
  - id: skip-lab-runtime-secrets
    path: (client/lab/)?\.runtime(-enterprise)?/.*|\.runtime-enterprise/.*
