# ExternalSecret — data-plane credentials for bundled profile (Postgres, Redis, MinIO).
# Store values in Vault; never commit literals.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repody-data-postgresql
  namespace: repody
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: CHANGE_ME_SECRET_STORE
    kind: ClusterSecretStore
  target:
    name: repody-data-postgresql
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef: { key: repody/production/data, property: POSTGRES_ADMIN_PASSWORD }
    - secretKey: password
      remoteRef: { key: repody/production/data, property: POSTGRES_USER_PASSWORD }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repody-data-redis
  namespace: repody
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: CHANGE_ME_SECRET_STORE
    kind: ClusterSecretStore
  target:
    name: repody-data-redis
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef: { key: repody/production/data, property: REDIS_PASSWORD }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repody-data-minio
  namespace: repody
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: CHANGE_ME_SECRET_STORE
    kind: ClusterSecretStore
  target:
    name: repody-data-minio
    creationPolicy: Owner
  data:
    - secretKey: rootUser
      remoteRef: { key: repody/production/data, property: MINIO_ROOT_USER }
    - secretKey: rootPassword
      remoteRef: { key: repody/production/data, property: MINIO_ROOT_PASSWORD }
