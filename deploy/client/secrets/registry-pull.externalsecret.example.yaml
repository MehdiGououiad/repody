# ExternalSecret for registry-pull-secret (dockerconfigjson).
# Name must match global.imagePullSecrets in values.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: registry-pull-secret
  namespace: repody
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: CHANGE_ME_SECRET_STORE
    kind: ClusterSecretStore
  target:
    name: registry-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: repody/production
        property: REGISTRY_DOCKERCONFIGJSON
