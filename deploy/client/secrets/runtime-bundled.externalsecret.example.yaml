# Bundled profile — runtime secret keys (connection strings + app auth).
# Populate Vault paths to match your in-cluster service DNS (namespace repody).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repody-runtime-secrets
  namespace: repody
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: CHANGE_ME_SECRET_STORE
    kind: ClusterSecretStore
  target:
    name: repody-runtime-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTH_SECRET
      remoteRef: { key: repody/production, property: AUTH_SECRET }
    - secretKey: AUTH_KEYCLOAK_CLIENT_SECRET
      remoteRef: { key: repody/production, property: AUTH_KEYCLOAK_CLIENT_SECRET }
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef: { key: repody/production, property: KEYCLOAK_ADMIN_PASSWORD }
    # Example in-cluster URLs (adjust user/password from Vault):
    - secretKey: AUDIT_DATABASE_URL
      remoteRef: { key: repody/production, property: AUDIT_DATABASE_URL }
    - secretKey: AUDIT_REDIS_URL
      remoteRef: { key: repody/production, property: AUDIT_REDIS_URL }
    - secretKey: AUDIT_MINIO_ACCESS_KEY
      remoteRef: { key: repody/production, property: AUDIT_MINIO_ACCESS_KEY }
    - secretKey: AUDIT_MINIO_SECRET_KEY
      remoteRef: { key: repody/production, property: AUDIT_MINIO_SECRET_KEY }
    - secretKey: BUGSINK_DSN
      remoteRef: { key: repody/production, property: BUGSINK_DSN }
    - secretKey: AUDIT_VLLM_API_KEY
      remoteRef: { key: repody/production, property: AUDIT_VLLM_API_KEY }
