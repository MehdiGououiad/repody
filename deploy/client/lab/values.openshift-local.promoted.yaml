# Generated by openshift-client-test.mjs register — commit and push before argocd sync.
# Generated bundled client values (lab)
global:
  deploymentProfile: bundled
  imagePullSecrets:
    - name: registry-pull-secret

ingress:
  enabled: true
  host: repody-web.apps-crc.testing
  apiHost: repody-api.apps-crc.testing
  filesHost: repody-files.apps-crc.testing
  filesServiceName: repody-data-minio
  filesServicePort: 9000
  tls:
    enabled: true
    secretName: repody-tls

images:
  backend:
    repository: host.crc.testing:5080/repody/repody-backend
    tag: 0.1.0
    pullPolicy: Always
  api:
    repository: host.crc.testing:5080/repody/repody-backend
    tag: 0.1.0
    pullPolicy: Always
  worker:
    repository: host.crc.testing:5080/repody/repody-backend
    tag: 0.1.0
    pullPolicy: Always
  web:
    repository: host.crc.testing:5080/repody/repody-web
    tag: 0.1.0
    pullPolicy: Always

secrets:
  existingSecret: repody-runtime-secrets

externalDatabase:
  existingSecret: repody-runtime-secrets
  urlKey: AUDIT_DATABASE_URL
  host: repody-data-postgresql
  port: 5432

externalRedis:
  existingSecret: repody-runtime-secrets
  urlKey: AUDIT_REDIS_URL

externalObjectStorage:
  endpoint: repody-data-minio:9000
  bucket: audit-documents
  existingSecret: repody-runtime-secrets
  accessKeyKey: AUDIT_MINIO_ACCESS_KEY
  secretKeyKey: AUDIT_MINIO_SECRET_KEY
  secure: false
  publicEndpoint: repody-files.apps-crc.testing

config:
  authUrl: https://repody-web.apps-crc.testing
  oidcIssuer: https://repody-auth.apps-crc.testing/realms/repody
  oidcJwksUrl: http://keycloak.repody.svc.cluster.local:8080/realms/repody/protocol/openid-connect/certs
  keycloakAdminUrl: https://repody-auth.apps-crc.testing
  corsOrigins: '["https://repody-web.apps-crc.testing"]'
  vllmBaseUrl: http://192.168.11.117:8081/v1
  vllmServedModel: nuextract3-q4_k_m
  operatorActionsEnabled: false
  # Stress-test caps (see deploy/client/lab/values.stress-test.crc.yaml)
  admissionMaxQueued: 1500
  admissionMaxInflight: 1200
  admissionMaxExtractInflight: 2
  admissionRetryAfterSeconds: 15
  rateLimitEnabled: true
  rateLimitWindowSeconds: 3600
  rateLimitRunsPerWorkflow: 2000
  rateLimitRunsPerClient: 5000
  dbPoolSize: 10
  dbMaxOverflow: 25
  redisMaxConnections: 50
  healthzProbeInference: false
  parallelDocExtraction: "true"
  parallelStorageFetch: true

workerExtract:
  replicas: 1
  maxJobs: 2
  autoscaling:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi

workerFast:
  replicas: 1
  maxJobs: 4
  autoscaling:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

observability:
  otelEnabled: false

migrations:
  enabled: true

global:
  openshift:
    enabled: true
    routes:
      enabled: false
