apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-repody
spec:
  # Restrict store to repody workload namespace (ESO security best practice).
  conditions:
    - namespaces:
        - repody
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: repody
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
