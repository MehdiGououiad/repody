# OpenTelemetry Collector — client-managed observability (upstream deployment mode).
# Install: helm upgrade --install otel open-telemetry/opentelemetry-collector -n observability -f this file
mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib

service:
  enabled: true
  type: ClusterIP

ports:
  otlp:
    enabled: false
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
  processors:
    batch: {}
  exporters:
    debug:
      verbosity: basic
  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi
