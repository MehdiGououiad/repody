# CRC / OpenShift Local — data-plane resource sizing (single-node ~10–12Gi allocatable).

postgresql:
  persistence:
    size: 8Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi

redis:
  persistence:
    size: 4Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi

minio:
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
  persistence:
    size: 8Gi
