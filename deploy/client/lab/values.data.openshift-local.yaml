# CRC / OpenShift Local — data-plane sizing + pinned images (see deploy/pinned-images.env).
global:
  security:
    allowInsecureImages: true

postgresql:
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0-debian-12-r4
  primary:
    persistence:
      size: 8Gi
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 512Mi

redis:
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 8.4.0-debian-12-r1
  master:
    persistence:
      size: 4Gi
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi

minio:
  image:
    registry: docker.io
    repository: pgsty/minio
    tag: RELEASE.2026-06-18T00-00-00Z
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
  persistence:
    enabled: true
    size: 8Gi
  console:
    replicaCount: 0
