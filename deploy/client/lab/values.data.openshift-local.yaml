# CRC / OpenShift Local — reduce data-plane memory (single-node ~16Gi).
minio:
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
  persistence:
    enabled: true
    size: 8Gi
  console:
    replicaCount: 0

postgresql:
  primary:
    persistence:
      size: 8Gi
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi

redis:
  master:
    persistence:
      size: 4Gi
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
