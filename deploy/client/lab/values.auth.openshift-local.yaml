# OpenShift Local — Keycloak via OpenShift Route (lab IdP). Hosts filled in *.promoted.yaml.

global:
  openshift:
    enabled: true
    routes:
      enabled: true

gatewayConsumerNamespace: repody

ingress:
  enabled: false
  className: ""
  annotations:
    route.openshift.io/termination: edge
  tls:
    enabled: true
    secretName: repody-tls

keycloak:
  enabled: true
  existingSecret: repody-runtime-secrets
  adminPassword: ""
  hostnameStrict: false
  proxyHeaders: xforwarded
  httpEnabled: true
  database:
    enabled: true
    host: repody-data-postgresql
    adminExistingSecret: repody-data-postgresql
    adminUsername: audit
