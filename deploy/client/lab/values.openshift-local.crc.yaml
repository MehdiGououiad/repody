# CRC single-node sizing only — security stays on values-enterprise.example.yaml (netpol, PDB, etc.).

api:
  replicas: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  topologySpreadConstraints:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

web:
  replicas: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  topologySpreadConstraints:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 384Mi

workerExtract:
  replicas: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  topologySpreadConstraints:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 1Gi

workerFast:
  replicas: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  topologySpreadConstraints:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
