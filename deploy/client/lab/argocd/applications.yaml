# Argo CD Applications — enterprise bundled profile (sync waves: data → auth → app).
# Placeholders VENDOR_REPO_URL, CLIENT_REPO_URL, VENDOR_REVISION replaced by enterprise-gitops-lab.mjs
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: repody-data
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: VENDOR_REPO_URL
      targetRevision: VENDOR_REVISION
      path: deploy/helm/repody-data
      helm:
        releaseName: repody-data
        valueFiles:
          - values.yaml
          - $values/values.data.yaml
    - repoURL: CLIENT_REPO_URL
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: repody
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: repody-auth
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: VENDOR_REPO_URL
      targetRevision: VENDOR_REVISION
      path: deploy/helm/repody-auth
      helm:
        releaseName: repody-auth
        valueFiles:
          - values.yaml
          - $values/values.auth.yaml
    - repoURL: CLIENT_REPO_URL
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: repody
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: repody
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: VENDOR_REPO_URL
      targetRevision: VENDOR_REVISION
      path: deploy/helm/repody
      helm:
        releaseName: repody
        valueFiles:
          - values-common.yaml
          - $values/values.k3s.yaml
          - $values/values.enterprise.yaml
          - $values/values.yaml
    - repoURL: CLIENT_REPO_URL
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: repody
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
  ignoreDifferences:
    - group: batch
      kind: Job
      jsonPointers:
        - /status
