# Argo CD Applications — external profile (data plane pre-deployed; sync waves: auth → app).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: repody-auth
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: VENDOR_REPO_URL
    targetRevision: VENDOR_REVISION
    path: deploy/helm/repody-auth
    helm:
      releaseName: repody-auth
      valueFiles:
        - values.yaml
        - ../../client/lab/values.auth.openshift-local.yaml
        - ../../client/lab/values.auth.openshift-local.promoted.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: repody
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: repody
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: VENDOR_REPO_URL
    targetRevision: VENDOR_REVISION
    path: deploy/helm/repody
    helm:
      releaseName: repody
      valueFiles:
        - values.yaml
        - values-common.yaml
        - ../../client/values-external.example.yaml
        - ../../client/values-enterprise.example.yaml
        - ../../values/openshift.yaml
        - ../../client/lab/values.lab.common.yaml
        - ../../client/lab/values.lab.external.yaml
        - ../../client/lab/values.openshift-local.promoted.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: repody
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
