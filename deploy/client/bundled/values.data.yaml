# Bundled data plane — production namespace repody.
# Postgres/Redis/MinIO passwords from ESO (repody-data-credentials), not Helm values.

global:
  deploymentEnvironment: production
  imagePullSecrets:
    - name: registry-pull-secret

gatewayConsumerNamespace: repody

postgresql:
  enabled: true
  auth:
    username: audit
    database: audit_workbench
    existingSecret: repody-data-postgresql
    secretKeys:
      passwordKey: password

redis:
  enabled: true
  auth:
    enabled: true
    existingSecret: repody-data-redis
    passwordKey: redis-password

minio:
  enabled: true
  auth:
    existingSecret: repody-data-minio
    rootUserKey: rootUser
    rootPasswordKey: rootPassword
  defaultBuckets: audit-documents
  persistence:
    enabled: true
    size: 50Gi
