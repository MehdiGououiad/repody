apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: repody-local-data
  namespace: argocd
  annotations:
    repody.dev/summary: PostgreSQL, Redis, MinIO (data plane)
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: repody
  source:
    repoURL: https://github.com/MehdiGououiad/repody.git
    targetRevision: master
    path: deploy/helm/repody-data
    helm:
      releaseName: repody-data
      valueFiles:
        - values.yaml
        - values-local.yaml
        - values-local-registry.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: repody-data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - .status
  revisionHistoryLimit: 5
---
