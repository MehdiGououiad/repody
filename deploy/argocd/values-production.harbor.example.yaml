# Example production values for a Harbor-backed deployment.
# Copy this to deploy/helm/repody/values-production.yaml or, preferably,
# keep the environment-specific version in a private GitOps config repo.

global:
  deploymentEnvironment: production
  imagePullSecrets:
    - name: harbor-pull-secret

images:
  api:
    repository: harbor.yourdomain.com/repody/repody-api
    tag: "<git-sha>"
    pullPolicy: IfNotPresent
  worker:
    repository: harbor.yourdomain.com/repody/repody-worker
    tag: "<git-sha>"
    pullPolicy: IfNotPresent
  web:
    repository: harbor.yourdomain.com/repody/repody-web
    tag: "<git-sha>"
    pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  host: app.yourdomain.com
  # Only routed by this chart when bundled minio.enabled=true.
  # With externalObjectStorage.enabled=true, point DNS/publicEndpoint at the
  # client object-storage service instead.
  filesHost: files.yourdomain.com
  tls:
    enabled: true
    secretName: repody-tls

secrets:
  create: false
  existingSecret: repody-runtime-secrets

config:
  oidcIssuer: https://auth.yourdomain.com/realms/repody
  oidcAudience: repody-api
  keycloakClientId: repody-web
  corsOrigins: '["https://app.yourdomain.com"]'
  inferenceMode: vllm
  vllmBaseUrl: https://vlm.yourdomain.com/v1
  vllmServedModel: numind/NuExtract3

postgresql:
  enabled: false

externalDatabase:
  enabled: true
  existingSecret: repody-runtime-secrets
  urlKey: AUDIT_DATABASE_URL

redis:
  enabled: false

externalRedis:
  enabled: true
  existingSecret: repody-runtime-secrets
  urlKey: AUDIT_REDIS_URL

minio:
  enabled: false

externalObjectStorage:
  enabled: true
  endpoint: s3.yourdomain.com
  bucket: audit-documents
  existingSecret: repody-runtime-secrets
  accessKeyKey: AUDIT_MINIO_ACCESS_KEY
  secretKeyKey: AUDIT_MINIO_SECRET_KEY
  secure: true
  publicEndpoint: files.yourdomain.com

hatchet:
  enabled: false

externalHatchet:
  enabled: true
  existingSecret: repody-runtime-secrets
  tokenKey: HATCHET_CLIENT_TOKEN
  hostPort: hatchet-grpc.yourdomain.com:443
  serverUrl: https://hatchet.yourdomain.com
  tlsStrategy: tls
