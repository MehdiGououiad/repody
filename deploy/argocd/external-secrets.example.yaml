# Example External Secrets Operator manifest for repody-runtime-secrets.
# Install ESO, create a ClusterSecretStore, then apply a variant of this in the repody namespace.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: repody-runtime-secrets
  namespace: repody
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: your-secret-store
    kind: ClusterSecretStore
  target:
    name: repody-runtime-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: repody/staging
        property: auth_secret
    - secretKey: AUTH_KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: repody/staging
        property: keycloak_client_secret
    - secretKey: HATCHET_POSTGRES_PASSWORD
      remoteRef:
        key: repody/staging
        property: hatchet_postgres_password
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: repody/staging
        property: keycloak_admin_password
