# Example External Secrets Operator manifest for repody-runtime-secrets.
# Install ESO, create a ClusterSecretStore, then apply a variant of this in the repody namespace.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repody-runtime-secrets
  namespace: repody
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: your-secret-store
    kind: ClusterSecretStore
  target:
    name: repody-runtime-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: repody/staging
        property: auth_secret
    - secretKey: AUTH_KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: repody/staging
        property: keycloak_client_secret
    - secretKey: AUDIT_DATABASE_URL
      remoteRef:
        key: repody/staging
        property: database_url
    - secretKey: AUDIT_REDIS_URL
      remoteRef:
        key: repody/staging
        property: redis_url
    - secretKey: AUDIT_MINIO_ACCESS_KEY
      remoteRef:
        key: repody/staging
        property: minio_access_key
    - secretKey: AUDIT_MINIO_SECRET_KEY
      remoteRef:
        key: repody/staging
        property: minio_secret_key
    - secretKey: HATCHET_CLIENT_TOKEN
      remoteRef:
        key: repody/staging
        property: hatchet_client_token
    - secretKey: BUGSINK_DSN
      remoteRef:
        key: repody/staging
        property: bugsink_dsn
    - secretKey: AUDIT_VLLM_API_KEY
      remoteRef:
        key: repody/staging
        property: vlm_api_key
