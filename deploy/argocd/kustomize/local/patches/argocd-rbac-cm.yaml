# https://argo-cd.readthedocs.io/en/stable/operator-manual/rbac/
# Default deny; grant admin only to the built-in admin account (not all users).
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
data:
  policy.default: role:readonly
  policy.csv: |
    p, role:repody-operator, applications, get, repody/*, allow
    p, role:repody-operator, applications, sync, repody/*, allow
    p, role:repody-operator, logs, get, repody/*, allow
    p, role:repody-operator, exec, create, repody/*, allow
    p, role:repody-operator, repositories, get, *, allow
    p, role:repody-operator, clusters, get, *, allow
    p, role:admin, applications, *, */*, allow
    p, role:admin, clusters, get, *, allow
    p, role:admin, repositories, get, *, allow
    p, role:admin, repositories, create, *, allow
    p, role:admin, repositories, update, *, allow
    p, role:admin, repositories, delete, *, allow
    p, role:admin, logs, get, */*, allow
    p, role:admin, exec, create, */*, allow
    g, admin, role:admin
