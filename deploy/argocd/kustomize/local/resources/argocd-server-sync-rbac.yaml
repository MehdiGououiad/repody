apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-server-repody-sync
  namespace: argocd
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-server-repody-sync
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-server-repody-sync
subjects:
  - kind: ServiceAccount
    name: argocd-server
    namespace: argocd
