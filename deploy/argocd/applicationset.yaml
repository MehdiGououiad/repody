# Optional: generate per-environment Argo CD Applications from one manifest.
# Requires Argo CD ApplicationSet controller. Adjust repoURL and domains for your org.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: repody-environments
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: staging
            valuesFile: values-staging.yaml
          - env: production
            valuesFile: values-production.yaml
  template:
    metadata:
      name: "repody-{{env}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: repody
      source:
        repoURL: https://github.com/MehdiGououiad/repody.git
        targetRevision: master
        path: deploy/helm/repody
        helm:
          releaseName: repody
          valueFiles:
            - values.yaml
            - "{{valuesFile}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: repody
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      # Enable automated sync per environment in Argo CD UI or patch syncPolicy after apply.
