name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: audit
          POSTGRES_PASSWORD: audit
          POSTGRES_DB: audit_workbench_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U audit -d audit_workbench_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend
        run: uv sync --extra dev
      - name: Pytest (unit + integration, Postgres + Alembic)
        run: uv run pytest tests/ -q -m "not live" --tb=short
        env:
          AUDIT_DATABASE_URL: postgresql+asyncpg://audit:audit@localhost:5432/audit_workbench_test
          AUDIT_SEED_ON_STARTUP: "false"
          AUDIT_USE_CREATE_ALL: "false"
      - name: Export OpenAPI
        run: uv run python scripts/export_openapi.py
      - name: OpenAPI drift check
        working-directory: ${{ github.workspace }}
        run: git diff --exit-code lib/api/openapi.json

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Generate OpenAPI types
        run: pnpm codegen:api
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: OpenAPI drift check
        run: git diff --exit-code lib/api/openapi.json lib/api/generated/schema.d.ts
      - name: Deploy checks
        run: pnpm deploy:check
      - name: Build
        run: pnpm build
        env:
          BACKEND_URL: http://127.0.0.1:8000

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
      - name: Start stack (API + web, stub extraction)
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: pnpm compose up --stack=e2e --build --wait
      - name: Playwright smoke
        run: pnpm test:e2e:smoke
        env:
          E2E_API_URL: http://localhost:8000
          E2E_WEB_URL: http://localhost:3000
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Live API pytest (Hatchet + workers)
        working-directory: backend
        run: uv sync --extra dev && uv run pytest tests/test_api/test_api_e2e_suite.py tests/test_e2e/test_facture_ui_e2e.py tests/test_api/test_document_types_run.py tests/test_api/test_uploads_duplicate.py tests/test_auth/test_run_create_access.py -v -m live --tb=short
        env:
          E2E_STACK: "1"
          E2E_API_URL: http://localhost:8000
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/report/
          retention-days: 7
      - name: Tear down stack
        if: always()
        run: pnpm compose down --stack=e2e --volumes
