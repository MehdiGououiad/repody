name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: pip install -e ".[dev]"
      - name: Pytest
        run: python -m pytest tests/ -q -m "not live" --tb=short
        env:
          AUDIT_DATABASE_URL: sqlite+aiosqlite:///:memory:
          AUDIT_SEED_ON_STARTUP: "false"

  # Playwright smoke: .github/workflows/e2e.yml (nightly + manual dispatch only)

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Deploy checks
        run: pnpm deploy:check
      - name: Build
        run: pnpm build
        env:
          BACKEND_URL: http://127.0.0.1:8000
