name: Security

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

env:
  TRIVY_VERSION: "0.72.0"
  SCAN_TAG: security-${{ github.sha }}

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: pnpm audit
        continue-on-error: true
        run: |
          mkdir -p dist-security
          pnpm audit --json > dist-security/pnpm-audit.json || echo '{}' > dist-security/pnpm-audit.json

      - name: pip-audit
        continue-on-error: true
        run: |
          mkdir -p dist-security
          uvx pip-audit --locked --project backend -f json > dist-security/pip-audit.json || echo '[]' > dist-security/pip-audit.json

      - name: Upload dependency audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-deps
          path: dist-security/*.json
          if-no-files-found: warn

  trivy-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: v0.72.0
          cache: true

      - name: Trivy filesystem (vuln + license)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: deploy/security/trivy.yaml
          scanners: vuln,license
          format: json
          output: trivy-fs.json
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: "0"

      - name: Trivy config (Dockerfile, Compose)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: config
          scan-ref: .
          trivy-config: deploy/security/trivy.yaml
          format: json
          output: trivy-config.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: deploy/security/trivy.yaml
          scanners: secret
          format: json
          output: trivy-secret.json
          exit-code: "0"

      - name: Trivy filesystem SARIF
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: deploy/security/trivy.yaml
          scanners: vuln,secret
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      - name: Upload Trivy repo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-trivy-repo
          path: |
            trivy-fs.json
            trivy-config.json
            trivy-secret.json
            trivy-fs.sarif

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build scan images
        env:
          REPODY_BACKEND_TAG: ${{ env.SCAN_TAG }}
          REPODY_WEB_TAG: ${{ env.SCAN_TAG }}
          AUTH_SECRET: build-placeholder-secret-32chars-min
          AUTH_KEYCLOAK_CLIENT_SECRET: repody-web-dev-secret
          AUTH_KEYCLOAK_ISSUER: https://auth.example.com/realms/repody
        run: node deploy/scripts/build-images.mjs

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@v0.2.3
        with:
          version: v0.72.0
          cache: true

      - name: Trivy image backend
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: repody-backend:${{ env.SCAN_TAG }}
          trivy-config: deploy/security/trivy.yaml
          format: json
          output: trivy-image-backend.json
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: "0"

      - name: Trivy image web
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: repody-web:${{ env.SCAN_TAG }}
          trivy-config: deploy/security/trivy.yaml
          format: json
          output: trivy-image-web.json
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: "0"

      - name: Trivy image SARIF (backend)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: repody-backend:${{ env.SCAN_TAG }}
          trivy-config: deploy/security/trivy.yaml
          format: sarif
          output: trivy-image-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-backend.sarif
          category: trivy-image-backend

      - name: Syft SBOM backend
        uses: anchore/sbom-action@v0
        with:
          image: repody-backend:${{ env.SCAN_TAG }}
          format: spdx-json
          output-file: syft-backend.spdx.json

      - name: Syft SBOM web
        uses: anchore/sbom-action@v0
        with:
          image: repody-web:${{ env.SCAN_TAG }}
          format: spdx-json
          output-file: syft-web.spdx.json

      - name: Grype scan backend SBOM
        uses: anchore/scan-action@v7
        id: grype-backend
        with:
          sbom: syft-backend.spdx.json
          fail-build: false
          output-format: json
          severity-cutoff: high

      - name: Grype scan web SBOM
        uses: anchore/scan-action@v7
        id: grype-web
        with:
          sbom: syft-web.spdx.json
          fail-build: false
          output-format: json
          severity-cutoff: high

      - name: Persist Grype JSON
        run: |
          cp "${{ steps.grype-backend.outputs.json }}" grype-backend.json
          cp "${{ steps.grype-web.outputs.json }}" grype-web.json

      - name: Upload container scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-containers
          path: |
            trivy-image-backend.json
            trivy-image-web.json
            syft-backend.spdx.json
            syft-web.spdx.json
            grype-backend.json
            grype-web.json

  report:
    runs-on: ubuntu-latest
    needs: [dependency-audit, trivy-repo, container-scan]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: security-*
          merge-multiple: true

      - name: Assemble dist/security
        run: |
          mkdir -p dist/security
          shopt -s nullglob
          for f in artifacts/*.json artifacts/**/*.json; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            cp "$f" "dist/security/$base"
          done
          ls -la dist/security || true

      - name: Generate merged report
        id: report
        run: node deploy/scripts/security-report.mjs
        continue-on-error: true

      - name: Upload complete report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            dist/security/report.md
            dist/security/report.json
            dist/security/*.json

      - name: Fail on gated findings
        if: steps.report.outcome == 'failure'
        run: exit 1
