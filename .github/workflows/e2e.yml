name: E2E live stack

# Optional live-stack pytest against a running dev deployment.
# Requires E2E_API_URL (and workers) — use workflow_dispatch until a stack is deployed.
on:
  workflow_dispatch:
    inputs:
      api_url:
        description: Base API URL
        required: false
        default: http://localhost:8000

jobs:
  live-api:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend
        run: uv sync --extra dev
      - name: Live API pytest
        run: uv run pytest tests/test_api/test_live_api_e2e.py tests/test_platform -v -m live --tb=short
        env:
          E2E_API_URL: ${{ github.event.inputs.api_url || 'http://localhost:8000' }}

  platform-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend
        run: uv sync --extra dev
      - name: Platform integration suite
        run: uv run python scripts/platform_integration_suite.py --skip-extraction
        env:
          E2E_API_URL: ${{ github.event.inputs.api_url || 'http://localhost:8000' }}
